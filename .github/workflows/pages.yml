name: Deploy static site to GitHub Pages

on:
  # Run on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Permissions needed to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate: domain/worker tests must pass before anything is published.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run tests (real shipped code)
        run: npm test

  deploy:
    needs: test            # only deploy if tests are green
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload entire repository
        uses: actions/upload-pages-artifact@v3
        with:
          # Serve everything in the repo root (index.html, nabiz.html, ...)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
