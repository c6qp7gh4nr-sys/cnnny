<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<title>Ortak Program · Görev Atama & Tamamlama</title>
<style>
  :root {
    --bg: #f4f5fb;
    --fg: #1c2030;
    --muted: #6b7280;
    --card: #ffffff;
    --line: #e6e8f0;
    --brand: #4f46e5;
    --brand-soft: #eef0ff;
    --accent: #10b981;
    --accent-soft: #e7f8f1;
    --warn: #f59e0b;
    --danger: #ef4444;
    --shadow: 0 4px 18px rgba(40, 44, 90, 0.08);
    --radius: 16px;
  }
  [data-theme="dark"] {
    --bg: #0e1018;
    --fg: #e8eaf2;
    --muted: #9aa0b4;
    --card: #181b27;
    --line: #262a3a;
    --brand: #7c83ff;
    --brand-soft: #20233a;
    --accent: #2dd4a7;
    --accent-soft: #16291f;
    --shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.45; font-size: 15px;
    padding-bottom: 96px; transition: background .25s, color .25s;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 0 14px; }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--brand), #6d28d9);
    color: #fff; padding: 18px 0 22px; border-radius: 0 0 24px 24px;
  }
  header .wrap { display: flex; flex-direction: column; gap: 14px; }
  .top-row { display: flex; align-items: center; gap: 12px; }
  .prog-title {
    font-size: 19px; font-weight: 700; flex: 1; background: transparent; border: none;
    color: #fff; outline: none; border-bottom: 1px dashed rgba(255,255,255,.35); padding: 2px 0;
  }
  .prog-title::placeholder { color: rgba(255,255,255,.6); }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 12px; border: none; cursor: pointer;
    background: rgba(255,255,255,.16); color: #fff; font-size: 17px; display: grid; place-items: center;
  }
  .icon-btn:active { transform: scale(.93); }
  .header-stats { display: flex; align-items: center; gap: 16px; }
  .ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .ring svg { transform: rotate(-90deg); }
  .ring .pct { position: absolute; inset: 0; display: grid; place-items: center; font-weight: 700; font-size: 15px; }
  .stat-lines { font-size: 13px; opacity: .92; }
  .stat-lines b { font-size: 16px; }

  /* Members bar */
  .members { display: flex; gap: 8px; overflow-x: auto; padding: 14px 0 4px; scrollbar-width: none; }
  .members::-webkit-scrollbar { display: none; }
  .member-chip {
    flex-shrink: 0; display: flex; align-items: center; gap: 7px; background: var(--card);
    border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px 6px 6px; cursor: pointer;
    box-shadow: var(--shadow); white-space: nowrap;
  }
  .member-chip.me { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-soft); }
  .avatar { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 12px; }
  .member-chip .mname { font-weight: 600; font-size: 13px; }
  .member-chip .mcount { font-size: 11px; color: var(--muted); }
  .add-member {
    flex-shrink: 0; border: 1px dashed var(--line); background: transparent; color: var(--muted);
    border-radius: 999px; padding: 7px 14px; cursor: pointer; font-size: 13px; font-weight: 600;
  }

  /* Filters */
  .filters { display: flex; gap: 8px; overflow-x: auto; padding: 12px 0; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0; border: 1px solid var(--line); background: var(--card); color: var(--muted);
    border-radius: 999px; padding: 7px 14px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .filter-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  /* Task list */
  .tasks { display: flex; flex-direction: column; gap: 10px; }
  .group-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin: 8px 2px 2px; }
  .task {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 12px 14px; display: flex; gap: 12px; box-shadow: var(--shadow); align-items: flex-start;
  }
  .task.done { opacity: .62; }
  .check {
    width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--line); flex-shrink: 0;
    cursor: pointer; display: grid; place-items: center; margin-top: 1px; transition: .15s; background: transparent;
  }
  .check.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-weight: 600; word-break: break-word; }
  .task.done .task-title { text-decoration: line-through; }
  .task-note { font-size: 13px; color: var(--muted); margin-top: 2px; word-break: break-word; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; align-items: center; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; }
  .tag.assignee { background: var(--brand-soft); color: var(--brand); }
  .tag.due { background: var(--accent-soft); color: var(--accent); }
  .tag.due.overdue { background: #fde8e8; color: var(--danger); }
  [data-theme="dark"] .tag.due.overdue { background: #3a1d1d; }
  .tag.prio-high { background: #fde8e8; color: var(--danger); }
  .tag.prio-med { background: #fef3da; color: var(--warn); }
  [data-theme="dark"] .tag.prio-high { background: #3a1d1d; }
  [data-theme="dark"] .tag.prio-med { background: #34280f; }
  .tag.done-by { background: var(--accent-soft); color: var(--accent); }
  .empty { text-align: center; color: var(--muted); padding: 48px 20px; }
  .empty .big { font-size: 38px; margin-bottom: 8px; }

  /* FAB */
  .fab {
    position: fixed; bottom: 22px; right: max(16px, calc((100vw - 680px)/2 + 16px));
    width: 58px; height: 58px; border-radius: 18px; border: none; cursor: pointer;
    background: var(--brand); color: #fff; font-size: 28px; box-shadow: 0 8px 24px rgba(79,70,229,.4);
    display: grid; place-items: center; z-index: 40;
  }
  .fab:active { transform: scale(.92); }

  /* Modal */
  .backdrop {
    position: fixed; inset: 0; background: rgba(10,12,22,.5); backdrop-filter: blur(3px);
    display: none; align-items: flex-end; justify-content: center; z-index: 60;
  }
  .backdrop.open { display: flex; }
  .sheet {
    background: var(--card); width: 100%; max-width: 680px; border-radius: 22px 22px 0 0;
    padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); max-height: 92vh; overflow-y: auto;
    animation: up .25s ease;
  }
  @keyframes up { from { transform: translateY(40px); opacity: 0; } }
  .sheet h2 { font-size: 17px; margin-bottom: 14px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 12px;
    background: var(--bg); color: var(--fg); font-size: 15px; font-family: inherit; outline: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--brand); }
  .field textarea { resize: vertical; min-height: 64px; }
  .seg { display: flex; gap: 8px; }
  .seg button {
    flex: 1; padding: 10px; border: 1px solid var(--line); background: var(--bg); color: var(--fg);
    border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .seg button.sel { background: var(--brand); color: #fff; border-color: var(--brand); }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 13px; border: none; border-radius: 13px; cursor: pointer; font-size: 15px; font-weight: 700;
  }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-ghost { background: var(--bg); color: var(--fg); border: 1px solid var(--line); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn:active { transform: scale(.97); }
  .assignee-picker { display: flex; flex-wrap: wrap; gap: 8px; }
  .assignee-opt {
    display: flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--bg);
    border-radius: 999px; padding: 5px 12px 5px 5px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .assignee-opt.sel { border-color: var(--brand); background: var(--brand-soft); color: var(--brand); }
  .share-code {
    width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--bg);
    color: var(--fg); font-family: monospace; font-size: 12px; resize: none; word-break: break-all;
  }
  .ai-box {
    background: linear-gradient(135deg, var(--brand-soft), var(--accent-soft));
    border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin: 14px 0 4px;
    font-size: 13.5px; line-height: 1.5;
  }
  .ai-box .ai-head { font-weight: 700; color: var(--brand); display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
  .member-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .member-row .avatar { width: 32px; height: 32px; }
  .member-row .grow { flex: 1; }
  .swatch-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .swatch.sel { border-color: var(--fg); }

  /* Toast */
  .toast {
    position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--fg); color: var(--bg); padding: 11px 20px; border-radius: 999px; font-size: 14px;
    font-weight: 600; opacity: 0; pointer-events: none; transition: .25s; z-index: 90; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="top-row">
      <input class="prog-title" id="progTitle" placeholder="Program adı..." maxlength="60">
      <button class="icon-btn" onclick="openShare()" title="Paylaş">🔗</button>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Tema">🌙</button>
    </div>
    <div class="header-stats">
      <div class="ring">
        <svg width="64" height="64">
          <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="6"/>
          <circle id="ringFill" cx="32" cy="32" r="27" fill="none" stroke="#fff" stroke-width="6"
                  stroke-linecap="round" stroke-dasharray="169.6" stroke-dashoffset="169.6"/>
        </svg>
        <div class="pct" id="ringPct">0%</div>
      </div>
      <div class="stat-lines">
        <div><b id="statDone">0</b> / <span id="statTotal">0</span> görev tamamlandı</div>
        <div id="statOpen">0 görev açık</div>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="members" id="members"></div>
  <div class="ai-box" id="aiBox" style="display:none;">
    <div class="ai-head">🤖 Analiz</div>
    <div id="aiText"></div>
  </div>
  <div class="filters" id="filters"></div>
  <div class="tasks" id="tasks"></div>
</div>

<button class="fab" onclick="openTask()">＋</button>

<div class="backdrop" id="backdrop" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ STATE ============ */
const COLORS = ['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6','#0ea5e9','#ec4899','#14b8a6'];
const FILTERS = [
  { id: 'all', label: 'Tümü' },
  { id: 'mine', label: 'Bana atanan' },
  { id: 'open', label: 'Açık' },
  { id: 'done', label: 'Tamamlanan' },
];
let state = loadState();
let activeFilter = 'all';

function defaultState() {
  return { v: 1, title: '', members: [], tasks: [], me: null };
}
function loadState() {
  // URL paylaşımı her şeyin önündedir
  const fromUrl = readShareFromUrl();
  if (fromUrl) {
    const local = safeParse(localStorage.getItem('ortakProgram'));
    // farklı bir program geldiyse içe aktarmayı sor; aynıysa sessizce kullan
    if (!local || local.title !== fromUrl.title || JSON.stringify(local.tasks) !== JSON.stringify(fromUrl.tasks)) {
      pendingImport = fromUrl;
    }
    history.replaceState(null, '', location.pathname + location.search);
    return local || fromUrl;
  }
  return safeParse(localStorage.getItem('ortakProgram')) || defaultState();
}
function safeParse(s) { try { return s ? JSON.parse(s) : null; } catch { return null; } }
function save() { localStorage.setItem('ortakProgram', JSON.stringify(state)); }
function uid() { return Math.random().toString(36).slice(2, 9); }

/* ============ UTF-8 SAFE BASE64 (paylaşım için) ============ */
function encodeData(obj) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
}
function decodeData(str) {
  return JSON.parse(decodeURIComponent(escape(atob(str))));
}
let pendingImport = null;
function readShareFromUrl() {
  const m = location.hash.match(/[#&]p=([^&]+)/);
  if (!m) return null;
  try { return decodeData(decodeURIComponent(m[1])); } catch { return null; }
}

/* ============ RENDER ============ */
function render() {
  document.getElementById('progTitle').value = state.title;
  renderMembers();
  renderFilters();
  renderTasks();
  renderStats();
  renderAI();
  save();
}

function memberById(id) { return state.members.find(m => m.id === id); }

function renderStats() {
  const total = state.tasks.length;
  const done = state.tasks.filter(t => t.done).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statOpen').textContent = (total - done) + ' görev açık';
  document.getElementById('ringPct').textContent = pct + '%';
  const C = 2 * Math.PI * 27;
  document.getElementById('ringFill').style.strokeDashoffset = C - (C * pct / 100);
}

function renderMembers() {
  const el = document.getElementById('members');
  el.innerHTML = '';
  state.members.forEach(m => {
    const count = state.tasks.filter(t => t.assignee === m.id);
    const doneC = count.filter(t => t.done).length;
    const chip = document.createElement('div');
    chip.className = 'member-chip' + (state.me === m.id ? ' me' : '');
    chip.innerHTML = `<div class="avatar" style="background:${m.color}">${initials(m.name)}</div>
      <div><div class="mname">${esc(m.name)}${state.me===m.id?' (ben)':''}</div>
      <div class="mcount">${doneC}/${count.length} görev</div></div>`;
    chip.onclick = () => openMember(m.id);
    el.appendChild(chip);
  });
  const add = document.createElement('button');
  add.className = 'add-member';
  add.textContent = '＋ Kişi ekle';
  add.onclick = () => openMember(null);
  el.appendChild(add);
}

function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '';
  FILTERS.forEach(f => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (activeFilter === f.id ? ' active' : '');
    b.textContent = f.label;
    b.onclick = () => { activeFilter = f.id; renderFilters(); renderTasks(); };
    el.appendChild(b);
  });
}

function filteredTasks() {
  let ts = state.tasks.slice();
  if (activeFilter === 'mine') ts = ts.filter(t => t.assignee === state.me);
  else if (activeFilter === 'open') ts = ts.filter(t => !t.done);
  else if (activeFilter === 'done') ts = ts.filter(t => t.done);
  // sıralama: açık önce, sonra önceliğe ve due'ya göre
  const prioRank = { high: 0, med: 1, low: 2 };
  ts.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (prioRank[a.priority] !== prioRank[b.priority]) return prioRank[a.priority] - prioRank[b.priority];
    return (a.due || '9999').localeCompare(b.due || '9999');
  });
  return ts;
}

function renderTasks() {
  const el = document.getElementById('tasks');
  const ts = filteredTasks();
  if (!ts.length) {
    el.innerHTML = `<div class="empty"><div class="big">🗂️</div>
      <div>${state.tasks.length ? 'Bu filtrede görev yok.' : 'Henüz görev yok. ＋ ile ekle.'}</div></div>`;
    return;
  }
  el.innerHTML = '';
  ts.forEach(t => el.appendChild(taskEl(t)));
}

function taskEl(t) {
  const a = memberById(t.assignee);
  const div = document.createElement('div');
  div.className = 'task' + (t.done ? ' done' : '');
  const overdue = t.due && !t.done && t.due < todayStr();
  let meta = '';
  if (a) meta += `<span class="tag assignee"><span class="avatar" style="width:16px;height:16px;font-size:9px;background:${a.color}">${initials(a.name)}</span>${esc(a.name)}</span>`;
  if (t.priority === 'high') meta += `<span class="tag prio-high">● Yüksek</span>`;
  else if (t.priority === 'med') meta += `<span class="tag prio-med">● Orta</span>`;
  if (t.due) meta += `<span class="tag due${overdue?' overdue':''}">📅 ${fmtDate(t.due)}${overdue?' • gecikti':''}</span>`;
  if (t.done && t.completedBy) {
    const cb = memberById(t.completedBy);
    meta += `<span class="tag done-by">✓ ${cb ? esc(cb.name) : 'biri'} tamamladı</span>`;
  }
  div.innerHTML = `
    <button class="check${t.done?' on':''}">${t.done?'✓':''}</button>
    <div class="task-body">
      <div class="task-title">${esc(t.title)}</div>
      ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
      ${meta ? `<div class="task-meta">${meta}</div>` : ''}
    </div>`;
  div.querySelector('.check').onclick = (e) => { e.stopPropagation(); toggleDone(t.id); };
  div.querySelector('.task-body').onclick = () => openTask(t.id);
  return div;
}

/* ============ AI ANALİZ (yerel kural tabanlı özet) ============ */
function renderAI() {
  const box = document.getElementById('aiBox');
  if (!state.tasks.length) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  document.getElementById('aiText').innerHTML = buildAnalysis();
}
function buildAnalysis() {
  const total = state.tasks.length;
  const done = state.tasks.filter(t => t.done).length;
  const pct = Math.round(done / total * 100);
  const open = total - done;
  const overdue = state.tasks.filter(t => t.due && !t.done && t.due < todayStr()).length;
  const unassigned = state.tasks.filter(t => !t.assignee && !t.done).length;
  let parts = [];
  // ilerleme yorumu
  if (pct === 100) parts.push('🎉 Tüm görevler tamam — program bitti, harikasınız!');
  else if (pct >= 70) parts.push(`Güçlü gidiyorsunuz: <b>%${pct}</b> tamam, sadece <b>${open}</b> görev kaldı.`);
  else if (pct >= 30) parts.push(`İyi yoldasınız: <b>%${pct}</b> tamamlandı, <b>${open}</b> görev açık.`);
  else parts.push(`Yeni başlıyorsunuz: <b>${open}</b> açık görev var. Küçük bir görevle başlayın, ivme kazanın.`);
  // gecikme uyarısı
  if (overdue) parts.push(`⚠️ <b>${overdue}</b> görev tarihi geçti — önce bunlara bakmak mantıklı.`);
  // atanmamış
  if (unassigned) parts.push(`👥 <b>${unassigned}</b> açık görev kimseye atanmamış; sahibini belirlemek işi hızlandırır.`);
  // iş yükü dengesi
  const load = {};
  state.members.forEach(m => load[m.id] = state.tasks.filter(t => t.assignee === m.id && !t.done).length);
  const entries = Object.entries(load).filter(([,n]) => n > 0).sort((a,b) => b[1]-a[1]);
  if (entries.length >= 2 && entries[0][1] - entries[entries.length-1][1] >= 3) {
    const top = memberById(entries[0][0]);
    parts.push(`⚖️ İş yükü dengesiz: <b>${esc(top.name)}</b> üzerinde ${entries[0][1]} açık görev var. Bir kısmını paylaştırabilirsiniz.`);
  }
  return parts.join('<br>');
}

/* ============ TASK CRUD ============ */
let editId = null;
let draft = {};
function openTask(id) {
  editId = id || null;
  const t = id ? state.tasks.find(x => x.id === id) : null;
  draft = t ? { ...t } : { title: '', note: '', assignee: state.me || null, priority: 'low', due: '' };
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <h2>${t ? 'Görevi düzenle' : 'Yeni görev'}</h2>
    <div class="field"><label>Başlık</label>
      <input id="fTitle" placeholder="Ne yapılacak?" value="${escAttr(draft.title)}"></div>
    <div class="field"><label>Not (opsiyonel)</label>
      <textarea id="fNote" placeholder="Detay, link, açıklama...">${esc(draft.note||'')}</textarea></div>
    <div class="field"><label>Kime atansın?</label>
      <div class="assignee-picker" id="assigneePicker"></div></div>
    <div class="field"><label>Öncelik</label>
      <div class="seg" id="prioSeg">
        <button data-p="low">Düşük</button><button data-p="med">Orta</button><button data-p="high">Yüksek</button>
      </div></div>
    <div class="field"><label>Bitiş tarihi (opsiyonel)</label>
      <input type="date" id="fDue" value="${draft.due||''}"></div>
    <div class="btn-row">
      ${t ? '<button class="btn btn-danger" onclick="deleteTask()">Sil</button>' : ''}
      <button class="btn btn-ghost" onclick="closeSheet()">İptal</button>
      <button class="btn btn-primary" onclick="saveTask()">${t ? 'Kaydet' : 'Ekle'}</button>
    </div>`;
  renderAssigneePicker();
  [...sheet.querySelectorAll('#prioSeg button')].forEach(b => {
    b.classList.toggle('sel', b.dataset.p === draft.priority);
    b.onclick = () => { draft.priority = b.dataset.p; [...b.parentNode.children].forEach(x => x.classList.toggle('sel', x === b)); };
  });
  openSheet();
  setTimeout(() => document.getElementById('fTitle').focus(), 100);
}
function renderAssigneePicker() {
  const el = document.getElementById('assigneePicker');
  el.innerHTML = '';
  const none = document.createElement('div');
  none.className = 'assignee-opt' + (!draft.assignee ? ' sel' : '');
  none.textContent = '— Kimse —';
  none.onclick = () => { draft.assignee = null; renderAssigneePicker(); };
  el.appendChild(none);
  state.members.forEach(m => {
    const o = document.createElement('div');
    o.className = 'assignee-opt' + (draft.assignee === m.id ? ' sel' : '');
    o.innerHTML = `<span class="avatar" style="width:20px;height:20px;font-size:10px;background:${m.color}">${initials(m.name)}</span>${esc(m.name)}`;
    o.onclick = () => { draft.assignee = m.id; renderAssigneePicker(); };
    el.appendChild(o);
  });
  if (!state.members.length) el.innerHTML += `<span style="color:var(--muted);font-size:13px;align-self:center;">Önce kişi ekleyin</span>`;
}
function saveTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { toast('Başlık gerekli'); return; }
  draft.title = title;
  draft.note = document.getElementById('fNote').value.trim();
  draft.due = document.getElementById('fDue').value;
  if (editId) {
    const i = state.tasks.findIndex(x => x.id === editId);
    state.tasks[i] = { ...state.tasks[i], ...draft };
  } else {
    state.tasks.push({ id: uid(), done: false, completedBy: null, completedAt: null, ...draft });
  }
  closeSheet(); render(); toast(editId ? 'Güncellendi' : 'Görev eklendi');
}
function deleteTask() {
  if (!confirm('Bu görev silinsin mi?')) return;
  state.tasks = state.tasks.filter(x => x.id !== editId);
  closeSheet(); render(); toast('Silindi');
}
function toggleDone(id) {
  const t = state.tasks.find(x => x.id === id);
  t.done = !t.done;
  if (t.done) { t.completedBy = state.me || t.assignee || null; t.completedAt = Date.now(); }
  else { t.completedBy = null; t.completedAt = null; }
  if (navigator.vibrate) navigator.vibrate(8);
  render();
}

/* ============ MEMBERS ============ */
let mEditId = null, mColor = COLORS[0];
function openMember(id) {
  mEditId = id;
  const m = id ? memberById(id) : null;
  mColor = m ? m.color : COLORS[state.members.length % COLORS.length];
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <h2>${m ? 'Kişiyi düzenle' : 'Kişi ekle'}</h2>
    <div class="field"><label>İsim</label>
      <input id="mName" placeholder="Ad" value="${m?escAttr(m.name):''}"></div>
    <div class="field"><label>Renk</label><div class="swatch-row" id="swatches"></div></div>
    ${m ? `<div class="field"><label>"Ben buyum" olarak işaretle</label>
      <button class="btn btn-ghost" onclick="setMe('${m.id}')">${state.me===m.id?'✓ Bu kişi benim':'Beni bu kişi yap'}</button></div>` : ''}
    <div class="btn-row">
      ${m ? '<button class="btn btn-danger" onclick="deleteMember()">Sil</button>' : ''}
      <button class="btn btn-ghost" onclick="closeSheet()">İptal</button>
      <button class="btn btn-primary" onclick="saveMember()">${m ? 'Kaydet' : 'Ekle'}</button>
    </div>`;
  const sw = document.getElementById('swatches');
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch' + (c === mColor ? ' sel' : '');
    d.style.background = c;
    d.onclick = () => { mColor = c; [...sw.children].forEach(x => x.classList.toggle('sel', x === d)); };
    sw.appendChild(d);
  });
  openSheet();
  setTimeout(() => document.getElementById('mName').focus(), 100);
}
function saveMember() {
  const name = document.getElementById('mName').value.trim();
  if (!name) { toast('İsim gerekli'); return; }
  if (mEditId) {
    const m = memberById(mEditId); m.name = name; m.color = mColor;
  } else {
    const id = uid();
    state.members.push({ id, name, color: mColor });
    if (!state.me) state.me = id; // ilk eklenen kişi varsayılan "ben"
  }
  closeSheet(); render(); toast('Kaydedildi');
}
function setMe(id) { state.me = id; closeSheet(); render(); toast('Bu kişi artık siz'); }
function deleteMember() {
  if (!confirm('Kişi silinsin mi? Görev atamaları kaldırılır.')) return;
  state.tasks.forEach(t => { if (t.assignee === mEditId) t.assignee = null; });
  state.members = state.members.filter(m => m.id !== mEditId);
  if (state.me === mEditId) state.me = state.members[0]?.id || null;
  closeSheet(); render(); toast('Silindi');
}

/* ============ SHARE ============ */
function buildShareUrl() {
  const data = encodeURIComponent(encodeData(state));
  return location.origin + location.pathname + '#p=' + data;
}
function openShare() {
  const url = buildShareUrl();
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <h2>🔗 Programı paylaş</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px;">
      Bağlantıyı gönderdiğinde tüm program (kişiler + görevler) karşı tarafta açılır. Sunucu yok — veri linkin içinde taşınır.</p>
    <div class="field"><label>Paylaşım bağlantısı</label>
      <textarea class="share-code" id="shareUrl" rows="3" readonly>${url}</textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="openImport()">İçe aktar</button>
      <button class="btn btn-primary" onclick="copyShare('${'shareUrl'}')">Bağlantıyı kopyala</button>
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button class="btn btn-ghost" onclick="nativeShare()" style="flex:none;width:100%;">📤 Paylaş menüsü</button>
    </div>`;
  openSheet();
}
function copyShare() {
  const v = document.getElementById('shareUrl').value;
  navigator.clipboard?.writeText(v).then(() => toast('Bağlantı kopyalandı ✓'),
    () => { document.getElementById('shareUrl').select(); document.execCommand('copy'); toast('Kopyalandı ✓'); });
}
function nativeShare() {
  const url = document.getElementById('shareUrl').value;
  if (navigator.share) navigator.share({ title: state.title || 'Ortak Program', url }).catch(()=>{});
  else copyShare();
}
function openImport() {
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <h2>İçe aktar</h2>
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px;">Aldığın paylaşım bağlantısını veya kodu yapıştır.</p>
    <div class="field"><label>Bağlantı / kod</label>
      <textarea class="share-code" id="importVal" rows="4" placeholder="https://...#p=..."></textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeSheet()">İptal</button>
      <button class="btn btn-primary" onclick="doImport()">Yükle</button>
    </div>`;
  openSheet();
}
function doImport() {
  let v = document.getElementById('importVal').value.trim();
  const m = v.match(/[#&]p=([^&]+)/);
  if (m) v = m[1];
  try {
    const data = decodeData(decodeURIComponent(v));
    if (!data || !Array.isArray(data.tasks)) throw 0;
    if (!confirm('Mevcut programın yerine bu program yüklensin mi?')) return;
    state = data; activeFilter = 'all';
    closeSheet(); render(); toast('Program yüklendi ✓');
  } catch { toast('Geçersiz bağlantı/kod'); }
}

/* ============ HELPERS ============ */
function initials(n) { return (n||'?').trim().split(/\s+/).map(w => w[0]).slice(0,2).join('').toUpperCase(); }
function esc(s) { return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escAttr(s) { return esc(s).replace(/"/g, '&quot;'); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtDate(d) {
  const dt = new Date(d + 'T00:00');
  return dt.toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' });
}
function openSheet() { document.getElementById('backdrop').classList.add('open'); }
function closeSheet() { document.getElementById('backdrop').classList.remove('open'); }
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
  localStorage.setItem('ortakTheme', dark ? 'light' : 'dark');
}

/* ============ INIT ============ */
document.getElementById('progTitle').addEventListener('input', e => { state.title = e.target.value; save(); });
if (localStorage.getItem('ortakTheme') === 'dark') toggleTheme();

function init() {
  render();
  if (pendingImport) {
    if (confirm('Bir paylaşım bağlantısı açtınız. Bu program yüklensin mi? (Mevcut veriniz değişebilir)')) {
      state = pendingImport; activeFilter = 'all';
    }
    pendingImport = null;
    render();
  }
}
init();
</script>
</body>
</html>
