<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ortak Program">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ortak Program · Proje & Görev Yönetimi</title>
<style>
  :root {
    --bg: #f4f5fb; --fg: #1c2030; --muted: #6b7280; --card: #ffffff; --line: #e6e8f0;
    --brand: #4f46e5; --brand-soft: #eef0ff; --accent: #10b981; --accent-soft: #e7f8f1;
    --warn: #f59e0b; --warn-soft: #fef3da; --danger: #ef4444; --danger-soft: #fde8e8;
    --purple: #8b5cf6; --purple-soft: #f1ecfe; --info: #0ea5e9; --info-soft: #e3f4fd;
    --shadow: 0 4px 18px rgba(40, 44, 90, 0.08); --radius: 16px;
  }
  [data-theme="dark"] {
    --bg: #0e1018; --fg: #e8eaf2; --muted: #9aa0b4; --card: #181b27; --line: #262a3a;
    --brand: #7c83ff; --brand-soft: #20233a; --accent: #2dd4a7; --accent-soft: #16291f;
    --warn: #fbbf24; --warn-soft: #34280f; --danger: #f87171; --danger-soft: #3a1d1d;
    --purple: #a78bfa; --purple-soft: #241f3a; --info: #38bdf8; --info-soft: #102733;
    --shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); line-height: 1.45; font-size: 15px; padding-bottom: 96px; transition: background .25s, color .25s; }
  .wrap { max-width: 700px; margin: 0 auto; padding: 0 14px; }

  header { background: linear-gradient(135deg, var(--brand), #6d28d9); color: #fff; padding: max(14px, env(safe-area-inset-top)) 0 22px; border-radius: 0 0 24px 24px; }
  header .wrap { display: flex; flex-direction: column; gap: 14px; }
  .top-row { display: flex; align-items: center; gap: 8px; }
  .prog-title { font-size: 19px; font-weight: 700; flex: 1; background: transparent; border: none; color: #fff; outline: none; border-bottom: 1px dashed rgba(255,255,255,.35); padding: 2px 0; min-width: 0; }
  .prog-title::placeholder { color: rgba(255,255,255,.6); }
  .icon-btn { width: 38px; height: 38px; border-radius: 12px; border: none; cursor: pointer; background: rgba(255,255,255,.16); color: #fff; font-size: 17px; display: grid; place-items: center; flex-shrink: 0; }
  .icon-btn:active { transform: scale(.93); }
  .header-stats { display: flex; align-items: center; gap: 16px; }
  .ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .ring svg { transform: rotate(-90deg); }
  .ring .pct { position: absolute; inset: 0; display: grid; place-items: center; font-weight: 700; font-size: 15px; }
  .stat-lines { font-size: 13px; opacity: .92; }
  .stat-lines b { font-size: 16px; }

  .members { display: flex; gap: 8px; overflow-x: auto; padding: 14px 0 4px; scrollbar-width: none; }
  .members::-webkit-scrollbar { display: none; }
  .member-chip { flex-shrink: 0; display: flex; align-items: center; gap: 7px; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px 6px 6px; cursor: pointer; box-shadow: var(--shadow); white-space: nowrap; }
  .member-chip.me { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-soft); }
  .avatar { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 12px; flex-shrink: 0; }
  .member-chip .mname { font-weight: 600; font-size: 13px; }
  .member-chip .mcount { font-size: 11px; color: var(--muted); }
  .add-member { flex-shrink: 0; border: 1px dashed var(--line); background: transparent; color: var(--muted); border-radius: 999px; padding: 7px 14px; cursor: pointer; font-size: 13px; font-weight: 600; }

  .toolbar { display: flex; gap: 8px; align-items: center; padding: 12px 0 4px; }
  .search { flex: 1; display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 9px 12px; }
  .search input { border: none; outline: none; background: transparent; color: var(--fg); font-size: 14px; width: 100%; font-family: inherit; }
  .filter-toggle { position: relative; border: 1px solid var(--line); background: var(--card); border-radius: 12px; padding: 9px 12px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--fg); white-space: nowrap; }
  .filter-toggle .dot { position: absolute; top: -5px; right: -5px; background: var(--brand); color: #fff; border-radius: 999px; font-size: 10px; padding: 1px 6px; font-weight: 700; }
  .filters { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0 4px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; border: 1px solid var(--line); background: var(--card); color: var(--muted); border-radius: 999px; padding: 7px 14px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .filter-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  .sec-head { display: flex; align-items: center; gap: 8px; margin: 20px 2px 10px; }
  .sec-head h3 { font-size: 16px; flex: 1; }
  .sec-head .add-btn { border: 1px solid var(--brand); background: var(--brand-soft); color: var(--brand); border-radius: 999px; padding: 6px 13px; cursor: pointer; font-size: 13px; font-weight: 700; }

  .proj-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }
  .proj-head { display: flex; align-items: center; gap: 10px; padding: 13px 14px; cursor: pointer; }
  .caret { transition: transform .2s; font-size: 13px; color: var(--muted); flex-shrink: 0; }
  .proj-card.collapsed .caret { transform: rotate(-90deg); }
  .proj-card.collapsed .proj-body { display: none; }
  .proj-info { flex: 1; min-width: 0; }
  .proj-name { font-weight: 700; word-break: break-word; }
  .proj-sub { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .mini-bar { flex: 1; height: 5px; background: var(--line); border-radius: 99px; overflow: hidden; max-width: 120px; }
  .mini-bar > span { display: block; height: 100%; background: var(--accent); border-radius: 99px; transition: width .3s; }
  .proj-count { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
  .badge.new { background: var(--brand-soft); color: var(--brand); }
  .badge.exist { background: var(--accent-soft); color: var(--accent); }
  .proj-body { border-top: 1px solid var(--line); padding: 6px 12px 12px; }
  .add-task-row { width: 100%; border: 1px dashed var(--line); background: transparent; color: var(--muted); border-radius: 12px; padding: 10px; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 8px; }

  .tasks { display: flex; flex-direction: column; gap: 9px; }
  .proj-body .tasks { gap: 8px; }
  .task { background: var(--card); border: 1px solid var(--line); border-radius: 13px; padding: 11px 13px; display: flex; gap: 11px; align-items: flex-start; }
  .proj-body .task { background: var(--bg); }
  .task.done { opacity: .6; }
  .task.blocked { border-left: 3px solid var(--danger); }
  .task.progress { border-left: 3px solid var(--info); }
  .check { width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--line); flex-shrink: 0; cursor: pointer; display: grid; place-items: center; margin-top: 1px; transition: .15s; background: transparent; color: #fff; font-size: 13px; }
  .check.on { background: var(--accent); border-color: var(--accent); }
  .check.recur { border-radius: 50%; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-weight: 600; word-break: break-word; }
  .task.done .task-title { text-decoration: line-through; }
  .task-note { font-size: 13px; color: var(--muted); margin-top: 2px; word-break: break-word; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; align-items: center; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; }
  .tag.assignee { background: var(--brand-soft); color: var(--brand); }
  .tag.due { background: var(--accent-soft); color: var(--accent); }
  .tag.due.overdue { background: var(--danger-soft); color: var(--danger); }
  .tag.prio-high { background: var(--danger-soft); color: var(--danger); }
  .tag.prio-med { background: var(--warn-soft); color: var(--warn); }
  .tag.freq { background: var(--purple-soft); color: var(--purple); }
  .tag.done-by { background: var(--accent-soft); color: var(--accent); }
  .tag.st-progress { background: var(--info-soft); color: var(--info); }
  .tag.st-blocked { background: var(--danger-soft); color: var(--danger); }
  .tag.sub { background: var(--bg); color: var(--muted); border: 1px solid var(--line); }
  .tag.cmt { background: var(--bg); color: var(--muted); border: 1px solid var(--line); }
  .empty { text-align: center; color: var(--muted); padding: 38px 20px; }
  .empty .big { font-size: 36px; margin-bottom: 8px; }
  .empty-sm { color: var(--muted); font-size: 13px; padding: 10px 4px; }

  .fab { position: fixed; bottom: 22px; right: max(16px, calc((100vw - 700px)/2 + 16px)); width: 58px; height: 58px; border-radius: 18px; border: none; cursor: pointer; background: var(--brand); color: #fff; font-size: 28px; box-shadow: 0 8px 24px rgba(79,70,229,.4); display: grid; place-items: center; z-index: 40; }
  .fab:active { transform: scale(.92); }

  .backdrop { position: fixed; inset: 0; background: rgba(10,12,22,.5); backdrop-filter: blur(3px); display: none; align-items: flex-end; justify-content: center; z-index: 60; }
  .backdrop.open { display: flex; }
  .sheet { background: var(--card); width: 100%; max-width: 700px; border-radius: 22px 22px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); max-height: 92vh; overflow-y: auto; animation: up .25s ease; }
  @keyframes up { from { transform: translateY(40px); opacity: 0; } }
  .sheet h2 { font-size: 17px; margin-bottom: 6px; word-break: break-word; }
  .sheet .hint { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .field input, .field textarea, .field select { width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--bg); color: var(--fg); font-size: 15px; font-family: inherit; outline: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--brand); }
  .field textarea { resize: vertical; min-height: 60px; }
  .seg { display: flex; gap: 8px; flex-wrap: wrap; }
  .seg button { flex: 1; min-width: 70px; padding: 10px; border: 1px solid var(--line); background: var(--bg); color: var(--fg); border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .seg button.sel { background: var(--brand); color: #fff; border-color: var(--brand); }
  .seg.status button.sel[data-s="progress"] { background: var(--info); border-color: var(--info); }
  .seg.status button.sel[data-s="blocked"] { background: var(--danger); border-color: var(--danger); }
  .seg.status button.sel[data-s="done"] { background: var(--accent); border-color: var(--accent); }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn { flex: 1; padding: 13px; border: none; border-radius: 13px; cursor: pointer; font-size: 15px; font-weight: 700; }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-ghost { background: var(--bg); color: var(--fg); border: 1px solid var(--line); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn:active { transform: scale(.97); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { display: flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--bg); border-radius: 999px; padding: 6px 13px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .chip.sel { border-color: var(--brand); background: var(--brand-soft); color: var(--brand); }
  .chip .avatar { width: 18px; height: 18px; font-size: 9px; }
  .big-choice { display: flex; gap: 12px; }
  .big-choice button { flex: 1; padding: 22px 12px; border: 1px solid var(--line); background: var(--bg); color: var(--fg); border-radius: var(--radius); cursor: pointer; font-weight: 700; font-size: 15px; }
  .big-choice .ico { font-size: 30px; display: block; margin-bottom: 8px; }
  .big-choice small { display: block; font-weight: 500; color: var(--muted); font-size: 12px; margin-top: 4px; }
  .share-code { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--bg); color: var(--fg); font-family: monospace; font-size: 12px; resize: none; word-break: break-all; }
  .swatch-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .swatch.sel { border-color: var(--fg); }

  /* Detail */
  .detail-meta { display: flex; flex-wrap: wrap; gap: 6px; margin: 4px 0 14px; }
  .sub-block { border-top: 1px solid var(--line); padding-top: 14px; margin-top: 14px; }
  .sub-block h4 { font-size: 13px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .4px; }
  .subtask { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
  .subtask .sc { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--line); flex-shrink: 0; cursor: pointer; display: grid; place-items: center; color: #fff; font-size: 11px; }
  .subtask .sc.on { background: var(--accent); border-color: var(--accent); }
  .subtask span { flex: 1; word-break: break-word; }
  .subtask.done span { text-decoration: line-through; color: var(--muted); }
  .subtask .del { color: var(--muted); cursor: pointer; padding: 2px 6px; }
  .inline-add { display: flex; gap: 8px; margin-top: 8px; }
  .inline-add input { flex: 1; padding: 9px 11px; border: 1px solid var(--line); border-radius: 10px; background: var(--bg); color: var(--fg); font-size: 14px; outline: none; }
  .inline-add button { border: none; background: var(--brand); color: #fff; border-radius: 10px; padding: 0 16px; font-weight: 700; cursor: pointer; }
  .comment { display: flex; gap: 9px; padding: 8px 0; }
  .comment .body { flex: 1; min-width: 0; }
  .comment .who { font-size: 12px; font-weight: 700; }
  .comment .when { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 6px; }
  .comment .txt { font-size: 14px; word-break: break-word; margin-top: 1px; }
  .activity { font-size: 12px; color: var(--muted); padding: 4px 0; display: flex; gap: 6px; }
  .activity .dot2 { color: var(--brand); }

  .ai-box { background: linear-gradient(135deg, var(--brand-soft), var(--accent-soft)); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin: 14px 0 4px; font-size: 13.5px; line-height: 1.55; }
  .ai-box .ai-head { font-weight: 700; color: var(--brand); display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }

  .toast { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--fg); color: var(--bg); padding: 11px 20px; border-radius: 999px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: .25s; z-index: 90; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="top-row">
      <input class="prog-title" id="progTitle" placeholder="Program adı..." maxlength="60">
      <button class="icon-btn" onclick="openDashboard()" title="İstatistik">📊</button>
      <button class="icon-btn" onclick="openShare()" title="Paylaş & Yedek">🔗</button>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Tema">🌙</button>
    </div>
    <div class="header-stats">
      <div class="ring">
        <svg width="64" height="64">
          <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="6"/>
          <circle id="ringFill" cx="32" cy="32" r="27" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-dasharray="169.6" stroke-dashoffset="169.6"/>
        </svg>
        <div class="pct" id="ringPct">0%</div>
      </div>
      <div class="stat-lines">
        <div><b id="statDone">0</b> / <span id="statTotal">0</span> görev tamam</div>
        <div id="statOpen">0 görev açık</div>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="members" id="members"></div>
  <div class="ai-box" id="aiBox" style="display:none;">
    <div class="ai-head">🤖 Analiz</div>
    <div id="aiText"></div>
  </div>
  <div class="toolbar">
    <div class="search">🔍<input id="searchInput" placeholder="Görev ara..." autocomplete="off"></div>
    <button class="filter-toggle" onclick="openFilterSheet()" id="filterToggle">Filtre</button>
  </div>
  <div class="filters" id="filters"></div>

  <div class="sec-head">
    <h3>📁 Projeler</h3>
    <button class="add-btn" onclick="openProject(null)">＋ Proje</button>
  </div>
  <div id="projects"></div>

  <div class="sec-head" id="customHead">
    <h3>📝 Özel Görevler</h3>
    <button class="add-btn" onclick="openTaskEdit(null,'custom')">＋ Görev</button>
  </div>
  <div class="tasks" id="customTasks"></div>
</div>

<button class="fab" onclick="openAddMenu()">＋</button>

<div class="backdrop" id="backdrop" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ CONFIG ============ */
const COLORS = ['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6','#0ea5e9','#ec4899','#14b8a6'];
const FILTERS = [
  { id: 'all', label: 'Tümü' }, { id: 'mine', label: 'Bana atanan' },
  { id: 'open', label: 'Açık' }, { id: 'progress', label: 'Devam eden' },
  { id: 'blocked', label: 'Engelli' }, { id: 'done', label: 'Tamamlanan' },
];
const FREQ_LABEL = { daily: 'Günlük', weekly: 'Haftalık', monthly: 'Aylık' };
const STATUS_LABEL = { todo: 'Açık', progress: 'Devam ediyor', blocked: 'Engellendi', done: 'Tamamlandı' };
const DAY = 864e5;
function periodMs(f) { return f === 'daily' ? DAY : f === 'weekly' ? 7 * DAY : 30 * DAY; }

let state = loadState();
let activeFilter = 'all';
let adv = { project: '', assignee: '', priority: '', tag: '', search: '' };

/* ============ STATE ============ */
function defaultState() { return { v: 3, title: '', members: [], me: null, projects: [], tasks: [] }; }
function migrate(s) {
  if (!s) return defaultState();
  if (!Array.isArray(s.projects)) s.projects = [];
  s.tasks = (s.tasks || []).map(t => ({
    kind: t.kind || 'custom', recurring: !!t.recurring,
    status: t.status || (t.done ? 'done' : 'todo'),
    subtasks: Array.isArray(t.subtasks) ? t.subtasks : [],
    comments: Array.isArray(t.comments) ? t.comments : [],
    activity: Array.isArray(t.activity) ? t.activity : [],
    tags: Array.isArray(t.tags) ? t.tags : [],
    createdAt: t.createdAt || Date.now(), ...t,
  }));
  s.v = 3;
  return s;
}
function loadState() {
  const fromUrl = readShareFromUrl();
  if (fromUrl) {
    const local = safeParse(localStorage.getItem('ortakProgram'));
    if (!local || JSON.stringify(local.tasks) !== JSON.stringify(fromUrl.tasks) || local.title !== fromUrl.title) pendingImport = migrate(fromUrl);
    history.replaceState(null, '', location.pathname + location.search);
    return migrate(local || fromUrl);
  }
  return migrate(safeParse(localStorage.getItem('ortakProgram')) || defaultState());
}
function safeParse(s) { try { return s ? JSON.parse(s) : null; } catch { return null; } }
function save() { localStorage.setItem('ortakProgram', JSON.stringify(state)); }
function uid() { return Math.random().toString(36).slice(2, 9); }

/* ============ BASE64 (UTF-8 safe) ============ */
function encodeData(obj) { return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
function decodeData(str) { return JSON.parse(decodeURIComponent(escape(atob(str)))); }
let pendingImport = null;
function readShareFromUrl() {
  const m = location.hash.match(/[#&]p=([^&]+)/);
  if (!m) return null;
  try { return decodeData(decodeURIComponent(m[1])); } catch { return null; }
}

/* ============ STATUS HELPERS ============ */
function projectById(id) { return state.projects.find(p => p.id === id); }
function memberById(id) { return state.members.find(m => m.id === id); }
function taskById(id) { return state.tasks.find(t => t.id === id); }
function nextDue(t) { return t.lastDone ? t.lastDone + periodMs(t.freq) : 0; }
function checkSatisfied(t) { return t.lastDone && Date.now() < nextDue(t); }
function isComplete(t) { return t.recurring ? checkSatisfied(t) : t.status === 'done'; }
function isOpenNow(t) { return !isComplete(t); }
function meName() { const m = memberById(state.me); return m ? m.name : 'Biri'; }
function logActivity(t, text) { t.activity = t.activity || []; t.activity.push({ at: Date.now(), by: meName(), text }); }

/* ============ RENDER ============ */
function render() {
  document.getElementById('progTitle').value = state.title;
  renderMembers(); renderFilters(); renderProjects(); renderCustom();
  renderStats(); renderAI(); updateFilterBadge();
  save();
}
function renderStats() {

function matchesSearch(t) {
  if (!adv.search) return true;
  const q = adv.search.toLowerCase();
  return (t.title || '').toLowerCase().includes(q) || (t.note || '').toLowerCase().includes(q);
}
function passFilter(t) {
  if (activeFilter === 'mine' && t.assignee !== state.me) return false;
  if (activeFilter === 'open' && !isOpenNow(t)) return false;
  if (activeFilter === 'done' && !isComplete(t)) return false;
  if (activeFilter === 'progress' && !(t.status === 'progress' && !t.recurring)) return false;
  if (activeFilter === 'blocked' && !(t.status === 'blocked' && !t.recurring)) return false;
  if (adv.assignee && t.assignee !== adv.assignee) return false;
  if (adv.priority && t.priority !== adv.priority) return false;
  if (adv.tag && !(t.tags || []).includes(adv.tag)) return false;
  return matchesSearch(t);
}
function sortTasks(ts) {
  const pr = { high: 0, med: 1, low: 2 };
  return ts.sort((a, b) => {
    const ao = isOpenNow(a), bo = isOpenNow(b);
    if (ao !== bo) return ao ? -1 : 1;
    if (pr[a.priority] !== pr[b.priority]) return pr[a.priority] - pr[b.priority];
    return (a.due || '9999').localeCompare(b.due || '9999');
  });
}

    card.querySelector('[data-edit]').onclick = (e) => { e.stopPropagation(); openProject(p.id); };
    const tl = card.querySelector('.tasks');
    if (!all.length) tl.innerHTML = `<div class="empty-sm">Bu projede görev yok.</div>`;

function renderCustom() {
  const head = document.getElementById('customHead'), el = document.getElementById('customTasks');
  if (adv.project && adv.project !== 'custom') { head.style.display = 'none'; el.style.display = 'none'; return; }

}
function taskEl(t) {
  const a = memberById(t.assignee), complete = isComplete(t);
  const div = document.createElement('div');
  div.className = 'task' + (complete ? ' done' : '') + (!complete && !t.recurring && t.status === 'blocked' ? ' blocked' : '') + (!complete && !t.recurring && t.status === 'progress' ? ' progress' : '');
  let meta = '';
  if (a) meta += `<span class="tag assignee"><span class="avatar" style="width:16px;height:16px;font-size:9px;background:${a.color}">${initials(a.name)}</span>${esc(a.name)}</span>`;
  if (!complete && !t.recurring && t.status === 'progress') meta += `<span class="tag st-progress">▶ Devam ediyor</span>`;
  if (!complete && !t.recurring && t.status === 'blocked') meta += `<span class="tag st-blocked">⛔ Engellendi</span>`;
  if (t.priority === 'high') meta += `<span class="tag prio-high">● Yüksek</span>`;
  else if (t.priority === 'med') meta += `<span class="tag prio-med">● Orta</span>`;
  if (t.recurring) {
    meta += `<span class="tag freq">🔁 ${FREQ_LABEL[t.freq] || 'Tekrar'}</span>`;
    if (complete) { const d = new Date(nextDue(t)); meta += `<span class="tag done-by">✓ kontrol edildi · sonraki ${d.toLocaleDateString('tr-TR',{day:'numeric',month:'short'})}</span>`; }
    else if (t.lastDone) { const od = Math.max(0, Math.floor((Date.now() - nextDue(t)) / DAY)); meta += `<span class="tag due overdue">⏰ kontrol zamanı${od?` · ${od} gün gecikti`:''}</span>`; }
    else meta += `<span class="tag due">⏰ henüz kontrol edilmedi</span>`;
  } else {
    const overdue = t.due && !complete && t.due < todayStr();
    if (t.due) meta += `<span class="tag due${overdue?' overdue':''}">📅 ${fmtDate(t.due)}${overdue?' • gecikti':''}</span>`;
    if (complete && t.completedBy) { const cb = memberById(t.completedBy); meta += `<span class="tag done-by">✓ ${cb ? esc(cb.name) : 'biri'}</span>`; }
  }
  const subDone = (t.subtasks || []).filter(s => s.done).length;
  if (t.subtasks && t.subtasks.length) meta += `<span class="tag sub">☑ ${subDone}/${t.subtasks.length}</span>`;
  if (t.comments && t.comments.length) meta += `<span class="tag cmt">💬 ${t.comments.length}</span>`;
  (t.tags || []).forEach(tg => meta += `<span class="tag sub">#${esc(tg)}</span>`);
  div.innerHTML = `
    <button class="check${complete?' on':''}${t.recurring?' recur':''}">${complete?'✓':''}</button>
    <div class="task-body">
      <div class="task-title">${esc(t.title)}</div>
      ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
      ${meta ? `<div class="task-meta">${meta}</div>` : ''}
    </div>`;
  div.querySelector('.check').onclick = (e) => { e.stopPropagation(); toggleDone(t.id); };
  div.querySelector('.task-body').onclick = () => openTaskDetail(t.id);
  return div;
}

/* ============ AI ANALİZ ============ */
function renderAI() {
  const box = document.getElementById('aiBox');
  if (!state.tasks.length) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  document.getElementById('aiText').innerHTML = buildAnalysis();
}
function buildAnalysis() {
  const total = state.tasks.length, done = state.tasks.filter(isComplete).length;
  const pct = Math.round(done / total * 100), open = total - done;
  const oneoffOverdue = state.tasks.filter(t => !t.recurring && t.due && t.status !== 'done' && t.due < todayStr()).length;
  const checksDue = state.tasks.filter(t => t.recurring && !checkSatisfied(t)).length;
  const blocked = state.tasks.filter(t => !t.recurring && t.status === 'blocked').length;
  const unassigned = state.tasks.filter(t => !t.assignee && isOpenNow(t)).length;
  const parts = [];
  if (pct === 100) parts.push('🎉 Her şey tamam — tüm görevler ve kontroller güncel!');
  else if (pct >= 70) parts.push(`Güçlü gidiyorsunuz: <b>%${pct}</b> tamam, <b>${open}</b> görev açık.`);
  else if (pct >= 30) parts.push(`İyi yoldasınız: <b>%${pct}</b> tamamlandı, <b>${open}</b> görev açık.`);
  else parts.push(`Yeni başlıyorsunuz: <b>${open}</b> açık görev. Küçük bir adımla ivme kazanın.`);
  if (blocked) parts.push(`⛔ <b>${blocked}</b> görev engellenmiş — önce bu tıkanıklıkları açın.`);
  if (checksDue) parts.push(`🔁 <b>${checksDue}</b> tekrarlayan kontrolün zamanı geldi.`);
  if (oneoffOverdue) parts.push(`⚠️ <b>${oneoffOverdue}</b> görev tarihi geçti.`);
  if (unassigned) parts.push(`👥 <b>${unassigned}</b> açık görev kimseye atanmamış.`);
  const fin = state.projects.filter(p => { const a = state.tasks.filter(t => t.projectId === p.id); return a.length && a.every(isComplete); });
  if (fin.length) parts.push(`✅ Tamamlanan proje: <b>${fin.map(p => esc(p.name)).join(', ')}</b>.`);
  const load = {}; state.members.forEach(m => load[m.id] = state.tasks.filter(t => t.assignee === m.id && isOpenNow(t)).length);
  const e = Object.entries(load).filter(([, n]) => n > 0).sort((a, b) => b[1] - a[1]);
  if (e.length >= 2 && e[0][1] - e[e.length - 1][1] >= 3) parts.push(`⚖️ İş yükü dengesiz: <b>${esc(memberById(e[0][0]).name)}</b> üzerinde ${e[0][1]} açık görev var.`);
  return parts.join('<br>');
}

/* ============ DASHBOARD & REMINDERS ============ */
function openDashboard() {
  const total = state.tasks.length, done = state.tasks.filter(isComplete).length, pct = total ? Math.round(done / total * 100) : 0;
  const st = { todo: 0, progress: 0, blocked: 0, done: 0 };

  const recTotal = state.tasks.filter(t => t.recurring).length;
  const recDue = state.tasks.filter(t => t.recurring && !checkSatisfied(t)).length;
  const stChip = (n, c, lbl) => n ? `<span class="tag" style="background:${c}1a;color:${c}">${lbl}: ${n}</span>` : '';
  const statusRow = [stChip(st.todo, '#6b7280', 'Açık'), stChip(st.progress, '#0ea5e9', 'Devam'), stChip(st.blocked, '#ef4444', 'Engelli'), stChip(st.done, '#10b981', 'Tamam'), recTotal ? `<span class="tag freq">🔁 ${recTotal - recDue}/${recTotal} kontrol güncel</span>` : ''].join('');

  const memRows = state.members.map(m => {
    const a = state.tasks.filter(t => t.assignee === m.id), d = a.filter(isComplete).length, p = a.length ? Math.round(d / a.length * 100) : 0;
    return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
      <span><span class="avatar" style="display:inline-grid;width:18px;height:18px;font-size:9px;background:${m.color};vertical-align:-4px">${initials(m.name)}</span> ${esc(m.name)}</span>
      <span style="color:var(--muted)">${d}/${a.length}</span></div>
      <div class="mini-bar" style="max-width:none"><span style="width:${p}%"></span></div></div>`;
  }).join('') || '<div class="empty-sm">Kişi yok.</div>';

  const projRows = state.projects.map(p => {
    const a = state.tasks.filter(t => t.projectId === p.id), d = a.filter(isComplete).length, pc = a.length ? Math.round(d / a.length * 100) : 0;

      <span>📁 ${esc(p.name)} <span style="font-size:10px;color:var(--muted)">${p.type === 'existing' ? 'kontrol' : 'kurulum'}</span></span>

      <div class="mini-bar" style="max-width:none"><span style="width:${pc}%;background:${p.color || 'var(--accent)'}"></span></div></div>`;
  }).join('') || '<div class="empty-sm">Proje yok.</div>';

  const upcoming = [];
  state.tasks.forEach(t => {

    const ov = u.when && u.when < Date.now();
    const lbl = u.t.recurring ? 'kontrol zamanı' : fmtDate(u.t.due);
    return `<div class="activity"><span style="color:${ov ? 'var(--danger)' : 'var(--accent)'}">${ov ? '⚠️' : '📅'}</span> ${esc(u.t.title)} · <b>${lbl}</b></div>`;

function notifyToday() {

    <div class="field"><label>Tür / proje</label><div class="chips" id="targetChips">
      <div class="chip${!draft.projectId?' sel':''}" data-pid="">📝 Özel görev</div>${projOpts}</div></div>
    <div class="field"><label>Başlık</label><input id="fTitle" placeholder="Ne yapılacak?" value="${escAttr(draft.title)}"></div>
    <div class="field"><label>Not (opsiyonel)</label><textarea id="fNote" placeholder="Detay, link, açıklama...">${esc(draft.note||'')}</textarea></div>
    <div class="field"><label>Etiketler (virgülle ayırın)</label><input id="fTags" placeholder="örn. acil, tasarım, müşteri" value="${escAttr((draft.tags||[]).join(', '))}"></div>
    <div class="field"><label>Kime atansın?</label><div class="chips" id="assigneePicker"></div></div>
    <div class="field"><label>Öncelik</label><div class="seg" id="prioSeg">
      <button data-p="low">Düşük</button><button data-p="med">Orta</button><button data-p="high">Yüksek</button></div></div>
    <div class="field" id="dueField"><label>Bitiş tarihi (opsiyonel)</label><input type="date" id="fDue" value="${draft.due||''}"></div>
    <div class="field" id="freqField"><label>Kontrol sıklığı</label><div class="seg" id="freqSeg">
      <button data-f="daily">Günlük</button><button data-f="weekly">Haftalık</button><button data-f="monthly">Aylık</button></div></div>
    <div class="btn-row">${t ? '<button class="btn btn-danger" onclick="deleteTask()">Sil</button>' : ''}
      <button class="btn btn-ghost" onclick="closeSheet()">İptal</button>
      <button class="btn btn-primary" onclick="saveTask()">${t ? 'Kaydet' : 'Ekle'}</button></div>`;
  [...sheet.querySelectorAll('#targetChips .chip')].forEach(c => { c.onclick = () => { draft.projectId = c.dataset.pid || null; [...c.parentNode.children].forEach(x => x.classList.toggle('sel', x === c)); syncEditorMode(); }; });
  renderAssigneePicker();
  [...sheet.querySelectorAll('#prioSeg button')].forEach(b => { b.classList.toggle('sel', b.dataset.p === (draft.priority||'low')); b.onclick = () => { draft.priority = b.dataset.p; [...b.parentNode.children].forEach(x => x.classList.toggle('sel', x === b)); }; });
  [...sheet.querySelectorAll('#freqSeg button')].forEach(b => { b.classList.toggle('sel', b.dataset.f === (draft.freq||'weekly')); b.onclick = () => { draft.freq = b.dataset.f; [...b.parentNode.children].forEach(x => x.classList.toggle('sel', x === b)); }; });
  syncEditorMode(); openSheet(); setTimeout(() => document.getElementById('fTitle').focus(), 100);
}
function syncEditorMode() {
  const p = draft.projectId ? projectById(draft.projectId) : null;
  const recurring = !!(p && p.type === 'existing');
  document.getElementById('freqField').style.display = recurring ? '' : 'none';
  document.getElementById('dueField').style.display = recurring ? 'none' : '';
}
function renderAssigneePicker() {
  const el = document.getElementById('assigneePicker'); el.innerHTML = '';
  const none = document.createElement('div'); none.className = 'chip' + (!draft.assignee ? ' sel' : ''); none.textContent = '— Kimse —';
  none.onclick = () => { draft.assignee = null; renderAssigneePicker(); }; el.appendChild(none);
  state.members.forEach(m => {
    const o = document.createElement('div'); o.className = 'chip' + (draft.assignee === m.id ? ' sel' : '');
    o.innerHTML = `<span class="avatar" style="background:${m.color}">${initials(m.name)}</span>${esc(m.name)}`;
    o.onclick = () => { draft.assignee = m.id; renderAssigneePicker(); }; el.appendChild(o);
  });
  if (!state.members.length) el.innerHTML += `<span style="color:var(--muted);font-size:13px;align-self:center;">Önce kişi ekleyin</span>`;
}
function saveTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { toast('Başlık gerekli'); return; }
  draft.title = title; draft.note = document.getElementById('fNote').value.trim(); draft.due = document.getElementById('fDue').value;
  draft.tags = document.getElementById('fTags').value.split(',').map(s => s.trim().replace(/^#/, '')).filter(Boolean).slice(0, 8);
  const p = draft.projectId ? projectById(draft.projectId) : null;
  draft.kind = p ? 'project' : 'custom'; draft.recurring = !!(p && p.type === 'existing');
  if (editId) { const i = state.tasks.findIndex(x => x.id === editId); state.tasks[i] = { ...state.tasks[i], ...draft }; }
  else state.tasks.push({ id: uid(), status: 'todo', completedBy: null, completedAt: null, lastDone: null, subtasks: [], comments: [], activity: [{ at: Date.now(), by: meName(), text: 'görevi oluşturdu' }], createdAt: Date.now(), ...draft });
  closeSheet(); render(); toast(editId ? 'Güncellendi' : 'Eklendi');
}
function deleteTask() {
  if (!confirm('Bu görev silinsin mi?')) return;
  state.tasks = state.tasks.filter(x => x.id !== editId);
  closeSheet(); render(); toast('Silindi');
}
function toggleDone(id) {
  const t = taskById(id);
  if (t.recurring) {
    if (checkSatisfied(t)) { t.lastDone = null; t.completedBy = null; logActivity(t, 'kontrolü geri aldı'); }
    else { t.lastDone = Date.now(); t.completedBy = state.me || t.assignee || null; logActivity(t, 'kontrol etti'); }
  } else {
    if (t.status === 'done') { t.status = 'todo'; t.completedBy = null; t.completedAt = null; logActivity(t, 'yeniden açtı'); }
    else { t.status = 'done'; t.completedBy = state.me || t.assignee || null; t.completedAt = Date.now(); logActivity(t, 'tamamladı'); }
  }
  if (navigator.vibrate) navigator.vibrate(8);
  render();
}

/* ============ TASK DETAIL ============ */
let detailId = null;
function openTaskDetail(id) {
  detailId = id; renderDetail(); openSheet();
}
function renderDetail() {
  const t = taskById(detailId); if (!t) { closeSheet(); return; }
  const p = t.projectId ? projectById(t.projectId) : null;
  const a = memberById(t.assignee);
  let meta = '';
  if (p) meta += `<span class="tag freq">📁 ${esc(p.name)}</span>`;
  if (a) meta += `<span class="tag assignee"><span class="avatar" style="width:16px;height:16px;font-size:9px;background:${a.color}">${initials(a.name)}</span>${esc(a.name)}</span>`;
  if (t.priority === 'high') meta += `<span class="tag prio-high">● Yüksek</span>`;
  else if (t.priority === 'med') meta += `<span class="tag prio-med">● Orta</span>`;
  if (t.recurring) { meta += `<span class="tag freq">🔁 ${FREQ_LABEL[t.freq]}</span>`; if (t.lastDone) meta += `<span class="tag due">son: ${fmtAgo(t.lastDone)}</span>`; }
  else if (t.due) { const ov = t.due < todayStr() && t.status !== 'done'; meta += `<span class="tag due${ov?' overdue':''}">📅 ${fmtDate(t.due)}</span>`; }

  const statusBlock = t.recurring ? `
    <div class="field"><label>Durum</label>
      <button class="btn ${isComplete(t)?'btn-primary':'btn-ghost'}" style="width:100%" onclick="toggleDone('${t.id}');renderDetail()">${isComplete(t)?'✓ Bu periyot kontrol edildi (geri al)':'⏰ Şimdi kontrol ettim'}</button></div>`
    : `<div class="field"><label>Durum</label><div class="seg status" id="dStatus">
        <button data-s="todo">Açık</button><button data-s="progress">Devam</button><button data-s="blocked">Engelli</button><button data-s="done">Tamam</button></div></div>`;

  const subs = (t.subtasks || []).map(s => `
    <div class="subtask ${s.done?'done':''}">
      <div class="sc ${s.done?'on':''}" data-sub="${s.id}">${s.done?'✓':''}</div>
      <span>${esc(s.title)}</span><span class="del" data-delsub="${s.id}">✕</span></div>`).join('');
  const subDone = (t.subtasks||[]).filter(s => s.done).length;

  const comments = (t.comments || []).slice().reverse().map(c => `
    <div class="comment"><div class="avatar" style="width:28px;height:28px;font-size:11px;background:${colorFor(c.by)}">${initials(c.by)}</div>
      <div class="body"><div class="who">${esc(c.by)}<span class="when">${fmtAgo(c.at)}</span></div><div class="txt">${esc(c.text)}</div></div></div>`).join('') || `<div class="empty-sm">Henüz yorum yok.</div>`;

  const acts = (t.activity || []).slice(-8).reverse().map(x => `<div class="activity"><span class="dot2">•</span> <b>${esc(x.by)}</b> ${esc(x.text)} · ${fmtAgo(x.at)}</div>`).join('') || `<div class="empty-sm">—</div>`;

  document.getElementById('sheet').innerHTML = `
    <h2>${esc(t.title)}</h2>
    ${t.note ? `<p class="hint" style="white-space:pre-wrap">${esc(t.note)}</p>` : ''}
    <div class="detail-meta">${meta}</div>
    ${statusBlock}
    <div class="sub-block"><h4>Alt görevler ${(t.subtasks||[]).length?`(${subDone}/${t.subtasks.length})`:''}</h4>
      ${subs}<div class="inline-add"><input id="newSub" placeholder="Alt görev ekle..."><button onclick="addSubtask()">Ekle</button></div></div>
    <div class="sub-block"><h4>💬 Yorumlar</h4>${comments}
      <div class="inline-add"><input id="newCmt" placeholder="Yorum yaz..."><button onclick="addComment()">Gönder</button></div></div>
    <div class="sub-block"><h4>📜 Aktivite</h4>${acts}</div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="openTaskEdit('${t.id}')">✎ Düzenle</button>
      <button class="btn btn-primary" onclick="closeSheet()">Kapat</button></div>`;

  if (!t.recurring) {
    const seg = document.getElementById('dStatus');
    [...seg.children].forEach(b => { b.classList.toggle('sel', b.dataset.s === t.status); b.onclick = () => setStatus(t.id, b.dataset.s); });
  }
  [...document.querySelectorAll('[data-sub]')].forEach(e => e.onclick = () => toggleSub(t.id, e.dataset.sub));
  [...document.querySelectorAll('[data-delsub]')].forEach(e => e.onclick = () => delSub(t.id, e.dataset.delsub));
  const ns = document.getElementById('newSub'); if (ns) ns.onkeydown = e => { if (e.key === 'Enter') addSubtask(); };
  const nc = document.getElementById('newCmt'); if (nc) nc.onkeydown = e => { if (e.key === 'Enter') addComment(); };
}
function setStatus(id, s) {
  const t = taskById(id);
  if (t.status === s) return;
  t.status = s;
  if (s === 'done') { t.completedBy = state.me || t.assignee || null; t.completedAt = Date.now(); }
  else { t.completedBy = null; t.completedAt = null; }
  logActivity(t, 'durumu “' + STATUS_LABEL[s] + '” yaptı');
  save(); renderDetail(); renderStats(); renderProjects(); renderCustom(); renderMembers(); renderAI();
}
function addSubtask() {
  const inp = document.getElementById('newSub'); const v = inp.value.trim(); if (!v) return;
  const t = taskById(detailId); t.subtasks = t.subtasks || []; t.subtasks.push({ id: uid(), title: v, done: false });
  save(); renderDetail(); document.getElementById('newSub').focus();
}
function toggleSub(id, sid) { const t = taskById(id); const s = t.subtasks.find(x => x.id === sid); s.done = !s.done; save(); renderDetail(); renderProjects(); renderCustom(); }
function delSub(id, sid) { const t = taskById(id); t.subtasks = t.subtasks.filter(x => x.id !== sid); save(); renderDetail(); renderProjects(); renderCustom(); }
function addComment() {
  const inp = document.getElementById('newCmt'); const v = inp.value.trim(); if (!v) return;
  if (!state.me) { toast('Önce kişi kartından “ben”i seçin'); return; }
  const t = taskById(detailId); t.comments = t.comments || []; t.comments.push({ id: uid(), by: meName(), at: Date.now(), text: v });
  logActivity(t, 'yorum yaptı'); save(); renderDetail(); renderProjects(); renderCustom();
}

/* ============ MEMBERS ============ */
let mEditId = null, mColor = COLORS[0];
function openMember(id) {
  mEditId = id; const m = id ? memberById(id) : null;
  mColor = m ? m.color : COLORS[state.members.length % COLORS.length];
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `<h2>${m ? 'Kişiyi düzenle' : 'Kişi ekle'}</h2>
    <div class="field"><label>İsim</label><input id="mName" placeholder="Ad" value="${m?escAttr(m.name):''}"></div>
    <div class="field"><label>Renk</label><div class="swatch-row" id="swatches"></div></div>
    ${m ? `<div class="field"><label>"Ben buyum" olarak işaretle</label><button class="btn btn-ghost" onclick="setMe('${m.id}')">${state.me===m.id?'✓ Bu kişi benim':'Beni bu kişi yap'}</button></div>` : ''}
    <div class="btn-row">${m ? '<button class="btn btn-danger" onclick="deleteMember()">Sil</button>' : ''}
      <button class="btn btn-ghost" onclick="closeSheet()">İptal</button>
      <button class="btn btn-primary" onclick="saveMember()">${m ? 'Kaydet' : 'Ekle'}</button></div>`;
  buildSwatches('swatches', () => mColor, c => mColor = c);
  openSheet(); setTimeout(() => document.getElementById('mName').focus(), 100);
}
function saveMember() {
  const name = document.getElementById('mName').value.trim();
  if (!name) { toast('İsim gerekli'); return; }
  if (mEditId) { const m = memberById(mEditId); m.name = name; m.color = mColor; }
  else { const id = uid(); state.members.push({ id, name, color: mColor }); if (!state.me) state.me = id; }
  closeSheet(); render(); toast('Kaydedildi');
}
function setMe(id) { state.me = id; closeSheet(); render(); toast('Bu kişi artık siz'); }
function deleteMember() {
  if (!confirm('Kişi silinsin mi? Görev atamaları kaldırılır.')) return;
  state.tasks.forEach(t => { if (t.assignee === mEditId) t.assignee = null; });
  state.members = state.members.filter(m => m.id !== mEditId);
  if (state.me === mEditId) state.me = state.members[0]?.id || null;
  closeSheet(); render(); toast('Silindi');
}

/* ============ SHARE / BACKUP ============ */
function buildShareUrl() { return location.origin + location.pathname + '#p=' + encodeURIComponent(encodeData(state)); }
function openShare() {
  const url = buildShareUrl();
  document.getElementById('sheet').innerHTML = `<h2>🔗 Paylaş & Yedek</h2>
    <p class="hint">Bağlantıyı gönderince tüm program (kişiler, projeler, görevler) karşı tarafta açılır. Sunucu yok — veri linkin içinde taşınır.</p>
    <div class="field"><label>Paylaşım bağlantısı</label><textarea class="share-code" id="shareUrl" rows="3" readonly>${url}</textarea></div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="nativeShare()">📤 Paylaş</button>
      <button class="btn btn-primary" onclick="copyShare()">Bağlantıyı kopyala</button></div>
    <div class="sub-block"><h4>Yedek (veri güvenliği)</h4>
      <div class="btn-row" style="margin-top:0"><button class="btn btn-ghost" onclick="exportJson()">⬇ Yedek indir (.json)</button>
        <button class="btn btn-ghost" onclick="openImport()">⬆ Geri yükle / içe aktar</button></div></div>`;
  openSheet();
}
function copyShare() {
  const v = document.getElementById('shareUrl').value;
  navigator.clipboard?.writeText(v).then(() => toast('Bağlantı kopyalandı ✓'), () => { document.getElementById('shareUrl').select(); document.execCommand('copy'); toast('Kopyalandı ✓'); });
}
function nativeShare() { const url = document.getElementById('shareUrl').value; if (navigator.share) navigator.share({ title: state.title || 'Ortak Program', url }).catch(() => {}); else copyShare(); }
function exportJson() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = (state.title || 'ortak-program').replace(/[^a-z0-9]+/gi, '-').toLowerCase() + '-yedek.json';
  a.click(); URL.revokeObjectURL(a.href); toast('Yedek indirildi ✓');
}
function openImport() {
  document.getElementById('sheet').innerHTML = `<h2>Geri yükle / içe aktar</h2>
    <p class="hint">Paylaşım bağlantısı/kodu yapıştırın ya da .json yedek dosyası seçin.</p>
    <div class="field"><label>Bağlantı / kod</label><textarea class="share-code" id="importVal" rows="4" placeholder="https://...#p=..."></textarea></div>
    <div class="field"><label>veya yedek dosyası</label><input type="file" id="importFile" accept="application/json,.json"></div>
    <div class="btn-row"><button class="btn btn-ghost" onclick="closeSheet()">İptal</button>
      <button class="btn btn-primary" onclick="doImportText()">Yükle</button></div>`;
  document.getElementById('importFile').onchange = (e) => {
    const f = e.target.files[0]; if (!f) return;
    const r = new FileReader(); r.onload = () => { try { loadImported(JSON.parse(r.result)); } catch { toast('Dosya okunamadı'); } }; r.readAsText(f);
  };
  openSheet();
}
function doImportText() {
  let v = document.getElementById('importVal').value.trim();
  const m = v.match(/[#&]p=([^&]+)/); if (m) v = m[1];
  try { loadImported(decodeData(decodeURIComponent(v))); } catch { toast('Geçersiz bağlantı/kod'); }
}
function loadImported(data) {
  if (!data || !Array.isArray(data.tasks)) { toast('Geçersiz veri'); return; }
  if (!confirm('Mevcut programın yerine bu veri yüklensin mi?')) return;
  state = migrate(data); activeFilter = 'all'; adv = { project: '', assignee: '', priority: '', tag: '', search: '' };
  closeSheet(); render(); toast('Yüklendi ✓');
}

/* ============ HELPERS ============ */
function buildSwatches(elId, get, set) {
  const sw = document.getElementById(elId);
  COLORS.forEach(c => { const d = document.createElement('div'); d.className = 'swatch' + (c === get() ? ' sel' : ''); d.style.background = c; d.onclick = () => { set(c); [...sw.children].forEach(x => x.classList.toggle('sel', x === d)); }; sw.appendChild(d); });
}
function colorFor(name) { let h = 0; for (const ch of (name||'')) h = (h * 31 + ch.charCodeAt(0)) % COLORS.length; return COLORS[h]; }
function initials(n) { return (n || '?').trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase(); }
function esc(s) { return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
function escAttr(s) { return esc(s).replace(/"/g, '&quot;'); }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function fmtDate(d) { return new Date(d + 'T00:00').toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' }); }
function fmtAgo(ts) {
  const s = (Date.now() - ts) / 1000;
  if (s < 60) return 'az önce'; if (s < 3600) return Math.floor(s / 60) + ' dk önce';
  if (s < 86400) return Math.floor(s / 3600) + ' sa önce'; if (s < 7 * 86400) return Math.floor(s / 86400) + ' gün önce';
  return new Date(ts).toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' });
}
function openSheet() { document.getElementById('backdrop').classList.add('open'); }
function closeSheet() { document.getElementById('backdrop').classList.remove('open'); }
let toastTimer;
function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2000); }
function toggleTheme() { const dark = document.documentElement.getAttribute('data-theme') === 'dark'; document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark'); document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️'; localStorage.setItem('ortakTheme', dark ? 'light' : 'dark'); }

/* ============ INIT ============ */
document.getElementById('progTitle').addEventListener('input', e => { state.title = e.target.value; save(); });
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => { clearTimeout(searchTimer); searchTimer = setTimeout(() => { adv.search = e.target.value.trim(); renderProjects(); renderCustom(); }, 150); });
if (localStorage.getItem('ortakTheme') === 'dark') toggleTheme();
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
function init() {
  render();
  if (pendingImport) {
    if (confirm('Bir paylaşım bağlantısı açtınız. Bu program yüklensin mi? (Mevcut veriniz değişebilir)')) { state = pendingImport; activeFilter = 'all'; }
    pendingImport = null; render();
  }
}
init();
</script>
</body>
</html>
