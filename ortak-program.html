<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<title>Ortak Program · Projeler & Görevler</title>
<style>
  :root {
    --bg: #f4f5fb; --fg: #1c2030; --muted: #6b7280; --card: #ffffff; --line: #e6e8f0;
    --brand: #4f46e5; --brand-soft: #eef0ff; --accent: #10b981; --accent-soft: #e7f8f1;
    --warn: #f59e0b; --danger: #ef4444; --purple: #8b5cf6; --purple-soft: #f1ecfe;
    --shadow: 0 4px 18px rgba(40, 44, 90, 0.08); --radius: 16px;
  }
  [data-theme="dark"] {
    --bg: #0e1018; --fg: #e8eaf2; --muted: #9aa0b4; --card: #181b27; --line: #262a3a;
    --brand: #7c83ff; --brand-soft: #20233a; --accent: #2dd4a7; --accent-soft: #16291f;
    --purple: #a78bfa; --purple-soft: #241f3a; --shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.45; font-size: 15px;
    padding-bottom: 96px; transition: background .25s, color .25s;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 0 14px; }

  header { background: linear-gradient(135deg, var(--brand), #6d28d9); color: #fff; padding: 18px 0 22px; border-radius: 0 0 24px 24px; }
  header .wrap { display: flex; flex-direction: column; gap: 14px; }
  .top-row { display: flex; align-items: center; gap: 12px; }
  .prog-title { font-size: 19px; font-weight: 700; flex: 1; background: transparent; border: none; color: #fff; outline: none; border-bottom: 1px dashed rgba(255,255,255,.35); padding: 2px 0; }
  .prog-title::placeholder { color: rgba(255,255,255,.6); }
  .icon-btn { width: 38px; height: 38px; border-radius: 12px; border: none; cursor: pointer; background: rgba(255,255,255,.16); color: #fff; font-size: 17px; display: grid; place-items: center; }
  .icon-btn:active { transform: scale(.93); }
  .header-stats { display: flex; align-items: center; gap: 16px; }
  .ring { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
  .ring svg { transform: rotate(-90deg); }
  .ring .pct { position: absolute; inset: 0; display: grid; place-items: center; font-weight: 700; font-size: 15px; }
  .stat-lines { font-size: 13px; opacity: .92; }
  .stat-lines b { font-size: 16px; }

  .members { display: flex; gap: 8px; overflow-x: auto; padding: 14px 0 4px; scrollbar-width: none; }
  .members::-webkit-scrollbar { display: none; }
  .member-chip { flex-shrink: 0; display: flex; align-items: center; gap: 7px; background: var(--card); border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px 6px 6px; cursor: pointer; box-shadow: var(--shadow); white-space: nowrap; }
  .member-chip.me { border-color: var(--brand); box-shadow: 0 0 0 2px var(--brand-soft); }
  .avatar { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 12px; }
  .member-chip .mname { font-weight: 600; font-size: 13px; }
  .member-chip .mcount { font-size: 11px; color: var(--muted); }
  .add-member { flex-shrink: 0; border: 1px dashed var(--line); background: transparent; color: var(--muted); border-radius: 999px; padding: 7px 14px; cursor: pointer; font-size: 13px; font-weight: 600; }

  .filters { display: flex; gap: 8px; overflow-x: auto; padding: 12px 0 4px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; border: 1px solid var(--line); background: var(--card); color: var(--muted); border-radius: 999px; padding: 7px 14px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .filter-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }

  .sec-head { display: flex; align-items: center; gap: 8px; margin: 20px 2px 10px; }
  .sec-head h3 { font-size: 16px; flex: 1; }
  .sec-head .add-btn { border: 1px solid var(--brand); background: var(--brand-soft); color: var(--brand); border-radius: 999px; padding: 6px 13px; cursor: pointer; font-size: 13px; font-weight: 700; }

  /* Project cards */
  .proj-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 12px; overflow: hidden; }
  .proj-head { display: flex; align-items: center; gap: 10px; padding: 13px 14px; cursor: pointer; }
  .caret { transition: transform .2s; font-size: 13px; color: var(--muted); flex-shrink: 0; }
  .proj-card.collapsed .caret { transform: rotate(-90deg); }
  .proj-card.collapsed .proj-body { display: none; }
  .proj-info { flex: 1; min-width: 0; }
  .proj-name { font-weight: 700; word-break: break-word; }
  .proj-sub { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .mini-bar { flex: 1; height: 5px; background: var(--line); border-radius: 99px; overflow: hidden; max-width: 120px; }
  .mini-bar > span { display: block; height: 100%; background: var(--accent); border-radius: 99px; }
  .proj-count { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; text-transform: uppercase; letter-spacing: .4px; }
  .badge.new { background: var(--brand-soft); color: var(--brand); }
  .badge.exist { background: var(--accent-soft); color: var(--accent); }
  .proj-body { border-top: 1px solid var(--line); padding: 6px 12px 12px; }
  .add-task-row { width: 100%; border: 1px dashed var(--line); background: transparent; color: var(--muted); border-radius: 12px; padding: 10px; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 8px; }

  /* Task rows */
  .tasks { display: flex; flex-direction: column; gap: 9px; }
  .proj-body .tasks { gap: 8px; }
  .task { background: var(--card); border: 1px solid var(--line); border-radius: 13px; padding: 11px 13px; display: flex; gap: 11px; align-items: flex-start; }
  .proj-body .task { background: var(--bg); }
  .task.done { opacity: .6; }
  .check { width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--line); flex-shrink: 0; cursor: pointer; display: grid; place-items: center; margin-top: 1px; transition: .15s; background: transparent; color: #fff; font-size: 13px; }
  .check.on { background: var(--accent); border-color: var(--accent); }
  .check.recur { border-radius: 50%; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-weight: 600; word-break: break-word; }
  .task.done .task-title { text-decoration: line-through; }
  .task-note { font-size: 13px; color: var(--muted); margin-top: 2px; word-break: break-word; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; align-items: center; }
  .tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; }
  .tag.assignee { background: var(--brand-soft); color: var(--brand); }
  .tag.due { background: var(--accent-soft); color: var(--accent); }
  .tag.due.overdue { background: #fde8e8; color: var(--danger); }
  [data-theme="dark"] .tag.due.overdue { background: #3a1d1d; }
  .tag.prio-high { background: #fde8e8; color: var(--danger); }
  .tag.prio-med { background: #fef3da; color: var(--warn); }
  [data-theme="dark"] .tag.prio-high { background: #3a1d1d; }
  [data-theme="dark"] .tag.prio-med { background: #34280f; }
  .tag.freq { background: var(--purple-soft); color: var(--purple); }
  .tag.done-by { background: var(--accent-soft); color: var(--accent); }
  .empty { text-align: center; color: var(--muted); padding: 38px 20px; }
  .empty .big { font-size: 36px; margin-bottom: 8px; }
  .empty-sm { color: var(--muted); font-size: 13px; padding: 10px 4px; }

  .fab { position: fixed; bottom: 22px; right: max(16px, calc((100vw - 680px)/2 + 16px)); width: 58px; height: 58px; border-radius: 18px; border: none; cursor: pointer; background: var(--brand); color: #fff; font-size: 28px; box-shadow: 0 8px 24px rgba(79,70,229,.4); display: grid; place-items: center; z-index: 40; }
  .fab:active { transform: scale(.92); }

  .backdrop { position: fixed; inset: 0; background: rgba(10,12,22,.5); backdrop-filter: blur(3px); display: none; align-items: flex-end; justify-content: center; z-index: 60; }
  .backdrop.open { display: flex; }
  .sheet { background: var(--card); width: 100%; max-width: 680px; border-radius: 22px 22px 0 0; padding: 20px 18px calc(20px + env(safe-area-inset-bottom)); max-height: 92vh; overflow-y: auto; animation: up .25s ease; }
  @keyframes up { from { transform: translateY(40px); opacity: 0; } }
  .sheet h2 { font-size: 17px; margin-bottom: 6px; }
  .sheet .hint { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .field input, .field textarea, .field select { width: 100%; padding: 11px 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--bg); color: var(--fg); font-size: 15px; font-family: inherit; outline: none; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--brand); }
  .field textarea { resize: vertical; min-height: 60px; }
  .seg { display: flex; gap: 8px; }
  .seg button { flex: 1; padding: 10px; border: 1px solid var(--line); background: var(--bg); color: var(--fg); border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .seg button.sel { background: var(--brand); color: #fff; border-color: var(--brand); }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn { flex: 1; padding: 13px; border: none; border-radius: 13px; cursor: pointer; font-size: 15px; font-weight: 700; }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-ghost { background: var(--bg); color: var(--fg); border: 1px solid var(--line); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn:active { transform: scale(.97); }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { display: flex; align-items: center; gap: 6px; border: 1px solid var(--line); background: var(--bg); border-radius: 999px; padding: 6px 13px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .chip.sel { border-color: var(--brand); background: var(--brand-soft); color: var(--brand); }
  .chip .avatar { width: 18px; height: 18px; font-size: 9px; }
  .big-choice { display: flex; gap: 12px; }
  .big-choice button { flex: 1; padding: 22px 12px; border: 1px solid var(--line); background: var(--bg); color: var(--fg); border-radius: var(--radius); cursor: pointer; font-weight: 700; font-size: 15px; }
  .big-choice .ico { font-size: 30px; display: block; margin-bottom: 8px; }
  .big-choice small { display: block; font-weight: 500; color: var(--muted); font-size: 12px; margin-top: 4px; }
  .share-code { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px; background: var(--bg); color: var(--fg); font-family: monospace; font-size: 12px; resize: none; word-break: break-all; }
  .swatch-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
  .swatch.sel { border-color: var(--fg); }

  .ai-box { background: linear-gradient(135deg, var(--brand-soft), var(--accent-soft)); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; margin: 14px 0 4px; font-size: 13.5px; line-height: 1.55; }
  .ai-box .ai-head { font-weight: 700; color: var(--brand); display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }

  .toast { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--fg); color: var(--bg); padding: 11px 20px; border-radius: 999px; font-size: 14px; font-weight: 600; opacity: 0; pointer-events: none; transition: .25s; z-index: 90; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="top-row">
      <input class="prog-title" id="progTitle" placeholder="Program adı..." maxlength="60">
      <button class="icon-btn" onclick="openShare()" title="Paylaş">🔗</button>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Tema">🌙</button>
    </div>
    <div class="header-stats">
      <div class="ring">
        <svg width="64" height="64">
          <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="6"/>
          <circle id="ringFill" cx="32" cy="32" r="27" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-dasharray="169.6" stroke-dashoffset="169.6"/>
        </svg>
        <div class="pct" id="ringPct">0%</div>
      </div>
      <div class="stat-lines">
        <div><b id="statDone">0</b> / <span id="statTotal">0</span> görev tamam</div>
        <div id="statOpen">0 görev açık</div>
      </div>
    </div>
  </div>
</header>

<div class="wrap">
  <div class="members" id="members"></div>
  <div class="ai-box" id="aiBox" style="display:none;">
    <div class="ai-head">🤖 Analiz</div>
    <div id="aiText"></div>
  </div>
  <div class="filters" id="filters"></div>

  <div class="sec-head">
    <h3>📁 Projeler</h3>
    <button class="add-btn" onclick="openProject(null)">＋ Proje</button>
  </div>
  <div id="projects"></div>

  <div class="sec-head">
    <h3>📝 Özel Görevler</h3>
    <button class="add-btn" onclick="openTask(null,'custom')">＋ Görev</button>
  </div>
  <div class="tasks" id="customTasks"></div>
</div>

<button class="fab" onclick="openAddMenu()">＋</button>

<div class="backdrop" id="backdrop" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============ CONFIG ============ */
const COLORS = ['#4f46e5','#10b981','#f59e0b','#ef4444','#8b5cf6','#0ea5e9','#ec4899','#14b8a6'];
const FILTERS = [
  { id: 'all', label: 'Tümü' },
  { id: 'mine', label: 'Bana atanan' },
  { id: 'open', label: 'Açık' },
  { id: 'done', label: 'Tamamlanan' },
];
const FREQ_LABEL = { daily: 'Günlük', weekly: 'Haftalık', monthly: 'Aylık' };
const DAY = 864e5;
function periodMs(f) { return f === 'daily' ? DAY : f === 'weekly' ? 7 * DAY : 30 * DAY; }

let state = loadState();
let activeFilter = 'all';

/* ============ STATE ============ */
function defaultState() { return { v: 2, title: '', members: [], me: null, projects: [], tasks: [] }; }
function migrate(s) {
  if (!s) return defaultState();
  if (!Array.isArray(s.projects)) s.projects = [];
  s.tasks = (s.tasks || []).map(t => ({ kind: t.kind || 'custom', recurring: !!t.recurring, ...t }));
  s.v = 2;
  return s;
}
function loadState() {
  const fromUrl = readShareFromUrl();
  if (fromUrl) {
    const local = safeParse(localStorage.getItem('ortakProgram'));
    if (!local || JSON.stringify(local.tasks) !== JSON.stringify(fromUrl.tasks) || local.title !== fromUrl.title) {
      pendingImport = migrate(fromUrl);
    }
    history.replaceState(null, '', location.pathname + location.search);
    return migrate(local || fromUrl);
  }
  return migrate(safeParse(localStorage.getItem('ortakProgram')) || defaultState());
}
function safeParse(s) { try { return s ? JSON.parse(s) : null; } catch { return null; } }
function save() { localStorage.setItem('ortakProgram', JSON.stringify(state)); }
function uid() { return Math.random().toString(36).slice(2, 9); }

/* ============ UTF-8 SAFE BASE64 ============ */
function encodeData(obj) { return btoa(unescape(encodeURIComponent(JSON.stringify(obj)))); }
function decodeData(str) { return JSON.parse(decodeURIComponent(escape(atob(str)))); }
let pendingImport = null;
function readShareFromUrl() {
  const m = location.hash.match(/[#&]p=([^&]+)/);
  if (!m) return null;
  try { return decodeData(decodeURIComponent(m[1])); } catch { return null; }
}

/* ============ TASK STATUS ============ */
function projectById(id) { return state.projects.find(p => p.id === id); }
function memberById(id) { return state.members.find(m => m.id === id); }
function nextDue(t) { return t.lastDone ? t.lastDone + periodMs(t.freq) : 0; }
function checkSatisfied(t) { return t.lastDone && Date.now() < nextDue(t); }
function isComplete(t) { return t.recurring ? checkSatisfied(t) : !!t.done; }
function isOpenNow(t) { return !isComplete(t); }

/* ============ RENDER ============ */
function render() {
  document.getElementById('progTitle').value = state.title;
  renderMembers();
  renderFilters();
  renderProjects();
  renderCustom();
  renderStats();
  renderAI();
  save();
}

function renderStats() {
  const total = state.tasks.length;
  const done = state.tasks.filter(isComplete).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statOpen').textContent = (total - done) + ' görev açık';
  document.getElementById('ringPct').textContent = pct + '%';
  const C = 2 * Math.PI * 27;
  document.getElementById('ringFill').style.strokeDashoffset = C - (C * pct / 100);
}

function renderMembers() {
  const el = document.getElementById('members');
  el.innerHTML = '';
  state.members.forEach(m => {
    const mine = state.tasks.filter(t => t.assignee === m.id);
    const doneC = mine.filter(isComplete).length;
    const chip = document.createElement('div');
    chip.className = 'member-chip' + (state.me === m.id ? ' me' : '');
    chip.innerHTML = `<div class="avatar" style="background:${m.color}">${initials(m.name)}</div>
      <div><div class="mname">${esc(m.name)}${state.me===m.id?' (ben)':''}</div>
      <div class="mcount">${doneC}/${mine.length} görev</div></div>`;
    chip.onclick = () => openMember(m.id);
    el.appendChild(chip);
  });
  const add = document.createElement('button');
  add.className = 'add-member'; add.textContent = '＋ Kişi ekle';
  add.onclick = () => openMember(null);
  el.appendChild(add);
}

function renderFilters() {
  const el = document.getElementById('filters');
  el.innerHTML = '';
  FILTERS.forEach(f => {
    const b = document.createElement('button');
    b.className = 'filter-btn' + (activeFilter === f.id ? ' active' : '');
    b.textContent = f.label;
    b.onclick = () => { activeFilter = f.id; render(); };
    el.appendChild(b);
  });
}

function passFilter(t) {
  if (activeFilter === 'mine') return t.assignee === state.me;
  if (activeFilter === 'open') return isOpenNow(t);
  if (activeFilter === 'done') return isComplete(t);
  return true;
}
function sortTasks(ts) {
  const pr = { high: 0, med: 1, low: 2 };
  return ts.sort((a, b) => {
    const ao = isOpenNow(a), bo = isOpenNow(b);
    if (ao !== bo) return ao ? -1 : 1;
    if (pr[a.priority] !== pr[b.priority]) return pr[a.priority] - pr[b.priority];
    return (a.due || '9999').localeCompare(b.due || '9999');
  });
}

function renderProjects() {
  const wrap = document.getElementById('projects');
  wrap.innerHTML = '';
  if (!state.projects.length) {
    wrap.innerHTML = `<div class="empty-sm">Henüz proje yok. “＋ Proje” ile yeni/mevcut bir proje ekleyin.</div>`;
    return;
  }
  state.projects.forEach(p => {
    const all = state.tasks.filter(t => t.kind === 'project' && t.projectId === p.id);
    const shown = sortTasks(all.filter(passFilter));
    const done = all.filter(isComplete).length;
    const pct = all.length ? Math.round(done / all.length * 100) : 0;
    const card = document.createElement('div');
    card.className = 'proj-card' + (p.collapsed ? ' collapsed' : '');
    const badge = p.type === 'existing'
      ? `<span class="badge exist">Mevcut · kontrol</span>`
      : `<span class="badge new">Yeni · kurulum</span>`;
    card.innerHTML = `
      <div class="proj-head">
        <span class="caret">▼</span>
        <div class="proj-info">
          <div class="proj-name">${esc(p.name)}</div>
          <div class="proj-sub">${badge}
            <div class="mini-bar"><span style="width:${pct}%"></span></div>
            <span class="proj-count">${done}/${all.length}</span>
          </div>
        </div>
        <button class="icon-btn" style="background:var(--bg);color:var(--muted)" data-edit>✎</button>
      </div>
      <div class="proj-body"><div class="tasks"></div></div>`;
    const head = card.querySelector('.proj-head');
    head.onclick = (e) => { if (e.target.closest('[data-edit]')) return; p.collapsed = !p.collapsed; save(); card.classList.toggle('collapsed'); };
    card.querySelector('[data-edit]').onclick = (e) => { e.stopPropagation(); openProject(p.id); };
    const tl = card.querySelector('.tasks');
    if (!all.length) tl.innerHTML = `<div class="empty-sm">Bu projede görev yok.</div>`;
    else if (!shown.length) tl.innerHTML = `<div class="empty-sm">Bu filtrede görev yok.</div>`;
    else shown.forEach(t => tl.appendChild(taskEl(t)));
    const addBtn = document.createElement('button');
    addBtn.className = 'add-task-row';
    addBtn.textContent = p.type === 'existing' ? '＋ kontrol ekle' : '＋ görev ekle';
    addBtn.onclick = () => openTask(null, p.id);
    card.querySelector('.proj-body').appendChild(addBtn);
    wrap.appendChild(card);
  });
}

function renderCustom() {
  const el = document.getElementById('customTasks');
  const all = state.tasks.filter(t => t.kind === 'custom');
  const shown = sortTasks(all.filter(passFilter));
  if (!all.length) { el.innerHTML = `<div class="empty-sm">Özel görev yok. Herhangi bir konuda görev ekleyebilirsiniz.</div>`; return; }
  if (!shown.length) { el.innerHTML = `<div class="empty-sm">Bu filtrede görev yok.</div>`; return; }
  el.innerHTML = '';
  shown.forEach(t => el.appendChild(taskEl(t)));
}

function taskEl(t) {
  const a = memberById(t.assignee);
  const complete = isComplete(t);
  const div = document.createElement('div');
  div.className = 'task' + (complete ? ' done' : '');
  let meta = '';
  if (a) meta += `<span class="tag assignee"><span class="avatar" style="width:16px;height:16px;font-size:9px;background:${a.color}">${initials(a.name)}</span>${esc(a.name)}</span>`;
  if (t.priority === 'high') meta += `<span class="tag prio-high">● Yüksek</span>`;
  else if (t.priority === 'med') meta += `<span class="tag prio-med">● Orta</span>`;

  if (t.recurring) {
    meta += `<span class="tag freq">🔁 ${FREQ_LABEL[t.freq] || 'Tekrar'}</span>`;
    if (complete) {
      const due = new Date(nextDue(t));
      meta += `<span class="tag done-by">✓ kontrol edildi · sonraki ${due.toLocaleDateString('tr-TR',{day:'numeric',month:'short'})}</span>`;
    } else if (t.lastDone) {
      const od = Math.max(0, Math.floor((Date.now() - nextDue(t)) / DAY));
      meta += `<span class="tag due overdue">⏰ kontrol zamanı${od?` · ${od} gün gecikti`:''}</span>`;
    } else {
      meta += `<span class="tag due">⏰ henüz kontrol edilmedi</span>`;
    }
  } else {
    const overdue = t.due && !complete && t.due < todayStr();
    if (t.due) meta += `<span class="tag due${overdue?' overdue':''}">📅 ${fmtDate(t.due)}${overdue?' • gecikti':''}</span>`;
    if (complete && t.completedBy) {
      const cb = memberById(t.completedBy);
      meta += `<span class="tag done-by">✓ ${cb ? esc(cb.name) : 'biri'} tamamladı</span>`;
    }
  }
  div.innerHTML = `
    <button class="check${complete?' on':''}${t.recurring?' recur':''}">${complete?'✓':''}</button>
    <div class="task-body">
      <div class="task-title">${esc(t.title)}</div>
      ${t.note ? `<div class="task-note">${esc(t.note)}</div>` : ''}
      ${meta ? `<div class="task-meta">${meta}</div>` : ''}
    </div>`;
  div.querySelector('.check').onclick = (e) => { e.stopPropagation(); toggleDone(t.id); };
  div.querySelector('.task-body').onclick = () => openTask(t.id);
  return div;
}

/* ============ AI ANALİZ ============ */
function renderAI() {
  const box = document.getElementById('aiBox');
  if (!state.tasks.length) { box.style.display = 'none'; return; }
  box.style.display = 'block';
  document.getElementById('aiText').innerHTML = buildAnalysis();
}
function buildAnalysis() {
  const total = state.tasks.length;
  const done = state.tasks.filter(isComplete).length;
  const pct = Math.round(done / total * 100);
  const open = total - done;
  const oneoffOverdue = state.tasks.filter(t => !t.recurring && t.due && !t.done && t.due < todayStr()).length;
  const checksDue = state.tasks.filter(t => t.recurring && !checkSatisfied(t)).length;
  const unassigned = state.tasks.filter(t => !t.assignee && isOpenNow(t)).length;
  const parts = [];
  if (pct === 100) parts.push('🎉 Her şey tamam — tüm görevler ve kontroller güncel!');
  else if (pct >= 70) parts.push(`Güçlü gidiyorsunuz: <b>%${pct}</b> tamam, <b>${open}</b> görev açık.`);
  else if (pct >= 30) parts.push(`İyi yoldasınız: <b>%${pct}</b> tamamlandı, <b>${open}</b> görev açık.`);
  else parts.push(`Yeni başlıyorsunuz: <b>${open}</b> açık görev. Küçük bir adımla ivme kazanın.`);
  if (checksDue) parts.push(`🔁 <b>${checksDue}</b> tekrarlayan kontrolün zamanı geldi.`);
  if (oneoffOverdue) parts.push(`⚠️ <b>${oneoffOverdue}</b> görev tarihi geçti — önce bunlara bakın.`);
  if (unassigned) parts.push(`👥 <b>${unassigned}</b> açık görev kimseye atanmamış.`);
  const finished = state.projects.filter(p => { const a = state.tasks.filter(t => t.projectId === p.id); return a.length && a.every(isComplete); });
  if (finished.length) parts.push(`✅ Tamamlanan proje: <b>${finished.map(p => esc(p.name)).join(', ')}</b>.`);
  const load = {};
  state.members.forEach(m => load[m.id] = state.tasks.filter(t => t.assignee === m.id && isOpenNow(t)).length);
  const e = Object.entries(load).filter(([, n]) => n > 0).sort((a, b) => b[1] - a[1]);
  if (e.length >= 2 && e[0][1] - e[e.length - 1][1] >= 3)
    parts.push(`⚖️ İş yükü dengesiz: <b>${esc(memberById(e[0][0]).name)}</b> üzerinde ${e[0][1]} açık görev var.`);
  return parts.join('<br>');
}

/* ============ ADD MENU ============ */
function openAddMenu() {
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <h2>Ne eklemek istersiniz?</h2>
    <p class="hint">Proje görevleri bir projeye bağlıdır; özel görevler herhangi bir konuda olabilir.</p>
    <div class="big-choice">
      <button onclick="openProject(null)"><span class="ico">📁</span>Proje<small>yeni veya mevcut</small></button>
      <button onclick="openTask(null,'custom')"><span class="ico">📝</span>Özel görev<small>serbest konu</small></button>
    </div>`;
  openSheet();
}

/* ============ PROJECT CRUD ============ */
let pEditId = null, pType = 'new', pColor = COLORS[0];
function openProject(id) {
  pEditId = id;
  const p = id ? projectById(id) : null;
  pType = p ? p.type : 'new';
  pColor = p ? (p.color || COLORS[0]) : COLORS[state.projects.length % COLORS.length];
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <h2>${p ? 'Projeyi düzenle' : 'Yeni proje'}</h2>
    <div class="field"><label>Proje adı</label>
      <input id="pName" placeholder="Proje adı" value="${p?escAttr(p.name):''}"></div>
    <div class="field"><label>Proje durumu</label>
      <div class="seg" id="pTypeSeg">
        <button data-t="new">🆕 Yeni proje<br><small style="font-weight:400;color:var(--muted)">kurulum görevleri</small></button>
        <button data-t="existing">📈 Mevcut proje<br><small style="font-weight:400;color:var(--muted)">tekrarlayan kontroller</small></button>
      </div></div>
    <div class="field"><label>Renk</label><div class="swatch-row" id="pSwatches"></div></div>
    <div class="btn-row">
      ${p ? '<button class="btn btn-danger" onclick="deleteProject()">Sil</button>' : ''}
      <button class="btn btn-ghost" onclick="closeSheet()">İptal</button>
      <button class="btn btn-primary" onclick="saveProject()">${p ? 'Kaydet' : 'Ekle'}</button>
    </div>`;
  const seg = document.getElementById('pTypeSeg');
  [...seg.children].forEach(b => {
    b.classList.toggle('sel', b.dataset.t === pType);
    b.onclick = () => { pType = b.dataset.t; [...seg.children].forEach(x => x.classList.toggle('sel', x === b)); };
  });
  const sw = document.getElementById('pSwatches');
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch' + (c === pColor ? ' sel' : ''); d.style.background = c;
    d.onclick = () => { pColor = c; [...sw.children].forEach(x => x.classList.toggle('sel', x === d)); };
    sw.appendChild(d);
  });
  openSheet();
  setTimeout(() => document.getElementById('pName').focus(), 100);
}
function saveProject() {
  const name = document.getElementById('pName').value.trim();
  if (!name) { toast('Proje adı gerekli'); return; }
  if (pEditId) {
    const p = projectById(pEditId);
    const was = p.type; p.name = name; p.type = pType; p.color = pColor;
    // tür değişti: bağlı görevlerin tekrar durumunu eşitle
    if (was !== pType) state.tasks.filter(t => t.projectId === p.id).forEach(t => syncTaskToProject(t, p));
  } else {
    const id = uid();
    state.projects.push({ id, name, type: pType, color: pColor, collapsed: false });
  }
  closeSheet(); render(); toast('Kaydedildi');
}
function syncTaskToProject(t, p) {
  if (p.type === 'existing') { t.recurring = true; t.freq = t.freq || 'weekly'; t.done = false; }
  else { t.recurring = false; t.lastDone = null; }
}
function deleteProject() {
  if (!confirm('Proje ve içindeki tüm görevler silinsin mi?')) return;
  state.tasks = state.tasks.filter(t => t.projectId !== pEditId);
  state.projects = state.projects.filter(p => p.id !== pEditId);
  closeSheet(); render(); toast('Proje silindi');
}

/* ============ TASK CRUD ============ */
let editId = null, draft = {};
function openTask(id, target) {
  editId = id || null;
  const t = id ? state.tasks.find(x => x.id === id) : null;
  if (t) draft = { ...t };
  else {
    const projectId = (target && target !== 'custom') ? target : null;
    draft = { title: '', note: '', assignee: state.me || null, priority: 'low', due: '', freq: 'weekly', projectId, lastDone: null };
  }
  const sheet = document.getElementById('sheet');
  const projOpts = state.projects.map(p =>
    `<div class="chip${draft.projectId===p.id?' sel':''}" data-pid="${p.id}">📁 ${esc(p.name)}</div>`).join('');
  sheet.innerHTML = `
    <h2>${t ? 'Görevi düzenle' : 'Yeni görev'}</h2>
    <div class="field"><label>Tür / proje</label>
      <div class="chips" id="targetChips">
        <div class="chip${!draft.projectId?' sel':''}" data-pid="">📝 Özel görev</div>
        ${projOpts}
      </div></div>
    <div class="field"><label>Başlık</label>
      <input id="fTitle" placeholder="Ne yapılacak?" value="${escAttr(draft.title)}"></div>
    <div class="field"><label>Not (opsiyonel)</label>
      <textarea id="fNote" placeholder="Detay, link, açıklama...">${esc(draft.note||'')}</textarea></div>
    <div class="field"><label>Kime atansın?</label>
      <div class="chips" id="assigneePicker"></div></div>
    <div class="field"><label>Öncelik</label>
      <div class="seg" id="prioSeg">
        <button data-p="low">Düşük</button><button data-p="med">Orta</button><button data-p="high">Yüksek</button>
      </div></div>
    <div class="field" id="dueField"><label>Bitiş tarihi (opsiyonel)</label>
      <input type="date" id="fDue" value="${draft.due||''}"></div>
    <div class="field" id="freqField"><label>Kontrol sıklığı</label>
      <div class="seg" id="freqSeg">
        <button data-f="daily">Günlük</button><button data-f="weekly">Haftalık</button><button data-f="monthly">Aylık</button>
      </div></div>
    <div class="btn-row">
      ${t ? '<button class="btn btn-danger" onclick="deleteTask()">Sil</button>' : ''}
      <button class="btn btn-ghost" onclick="closeSheet()">İptal</button>
      <button class="btn btn-primary" onclick="saveTask()">${t ? 'Kaydet' : 'Ekle'}</button>
    </div>`;
  // target chips
  [...sheet.querySelectorAll('#targetChips .chip')].forEach(c => {
    c.onclick = () => { draft.projectId = c.dataset.pid || null; [...c.parentNode.children].forEach(x => x.classList.toggle('sel', x === c)); syncEditorMode(); };
  });
  renderAssigneePicker();
  [...sheet.querySelectorAll('#prioSeg button')].forEach(b => {
    b.classList.toggle('sel', b.dataset.p === draft.priority);
    b.onclick = () => { draft.priority = b.dataset.p; [...b.parentNode.children].forEach(x => x.classList.toggle('sel', x === b)); };
  });
  [...sheet.querySelectorAll('#freqSeg button')].forEach(b => {
    b.classList.toggle('sel', b.dataset.f === draft.freq);
    b.onclick = () => { draft.freq = b.dataset.f; [...b.parentNode.children].forEach(x => x.classList.toggle('sel', x === b)); };
  });
  syncEditorMode();
  openSheet();
  setTimeout(() => document.getElementById('fTitle').focus(), 100);
}
function syncEditorMode() {
  const p = draft.projectId ? projectById(draft.projectId) : null;
  const recurring = !!(p && p.type === 'existing');
  document.getElementById('freqField').style.display = recurring ? '' : 'none';
  document.getElementById('dueField').style.display = recurring ? 'none' : '';
}
function renderAssigneePicker() {
  const el = document.getElementById('assigneePicker');
  el.innerHTML = '';
  const none = document.createElement('div');
  none.className = 'chip' + (!draft.assignee ? ' sel' : ''); none.textContent = '— Kimse —';
  none.onclick = () => { draft.assignee = null; renderAssigneePicker(); };
  el.appendChild(none);
  state.members.forEach(m => {
    const o = document.createElement('div');
    o.className = 'chip' + (draft.assignee === m.id ? ' sel' : '');
    o.innerHTML = `<span class="avatar" style="background:${m.color}">${initials(m.name)}</span>${esc(m.name)}`;
    o.onclick = () => { draft.assignee = m.id; renderAssigneePicker(); };
    el.appendChild(o);
  });
  if (!state.members.length) el.innerHTML += `<span style="color:var(--muted);font-size:13px;align-self:center;">Önce kişi ekleyin</span>`;
}
function saveTask() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { toast('Başlık gerekli'); return; }
  draft.title = title;
  draft.note = document.getElementById('fNote').value.trim();
  draft.due = document.getElementById('fDue').value;
  const p = draft.projectId ? projectById(draft.projectId) : null;
  draft.kind = p ? 'project' : 'custom';
  draft.recurring = !!(p && p.type === 'existing');
  if (editId) {
    const i = state.tasks.findIndex(x => x.id === editId);
    state.tasks[i] = { ...state.tasks[i], ...draft };
  } else {
    state.tasks.push({ id: uid(), done: false, completedBy: null, completedAt: null, lastDone: null, ...draft });
  }
  closeSheet(); render(); toast(editId ? 'Güncellendi' : 'Eklendi');
}
function deleteTask() {
  if (!confirm('Bu görev silinsin mi?')) return;
  state.tasks = state.tasks.filter(x => x.id !== editId);
  closeSheet(); render(); toast('Silindi');
}
function toggleDone(id) {
  const t = state.tasks.find(x => x.id === id);
  if (t.recurring) {
    if (checkSatisfied(t)) { t.lastDone = null; t.completedBy = null; }
    else { t.lastDone = Date.now(); t.completedBy = state.me || t.assignee || null; }
  } else {
    t.done = !t.done;
    if (t.done) { t.completedBy = state.me || t.assignee || null; t.completedAt = Date.now(); }
    else { t.completedBy = null; t.completedAt = null; }
  }
  if (navigator.vibrate) navigator.vibrate(8);
  render();
}

/* ============ MEMBERS ============ */
let mEditId = null, mColor = COLORS[0];
function openMember(id) {
  mEditId = id;
  const m = id ? memberById(id) : null;
  mColor = m ? m.color : COLORS[state.members.length % COLORS.length];
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <h2>${m ? 'Kişiyi düzenle' : 'Kişi ekle'}</h2>
    <div class="field"><label>İsim</label>
      <input id="mName" placeholder="Ad" value="${m?escAttr(m.name):''}"></div>
    <div class="field"><label>Renk</label><div class="swatch-row" id="swatches"></div></div>
    ${m ? `<div class="field"><label>"Ben buyum" olarak işaretle</label>
      <button class="btn btn-ghost" onclick="setMe('${m.id}')">${state.me===m.id?'✓ Bu kişi benim':'Beni bu kişi yap'}</button></div>` : ''}
    <div class="btn-row">
      ${m ? '<button class="btn btn-danger" onclick="deleteMember()">Sil</button>' : ''}
      <button class="btn btn-ghost" onclick="closeSheet()">İptal</button>
      <button class="btn btn-primary" onclick="saveMember()">${m ? 'Kaydet' : 'Ekle'}</button>
    </div>`;
  const sw = document.getElementById('swatches');
  COLORS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'swatch' + (c === mColor ? ' sel' : ''); d.style.background = c;
    d.onclick = () => { mColor = c; [...sw.children].forEach(x => x.classList.toggle('sel', x === d)); };
    sw.appendChild(d);
  });
  openSheet();
  setTimeout(() => document.getElementById('mName').focus(), 100);
}
function saveMember() {
  const name = document.getElementById('mName').value.trim();
  if (!name) { toast('İsim gerekli'); return; }
  if (mEditId) { const m = memberById(mEditId); m.name = name; m.color = mColor; }
  else { const id = uid(); state.members.push({ id, name, color: mColor }); if (!state.me) state.me = id; }
  closeSheet(); render(); toast('Kaydedildi');
}
function setMe(id) { state.me = id; closeSheet(); render(); toast('Bu kişi artık siz'); }
function deleteMember() {
  if (!confirm('Kişi silinsin mi? Görev atamaları kaldırılır.')) return;
  state.tasks.forEach(t => { if (t.assignee === mEditId) t.assignee = null; });
  state.members = state.members.filter(m => m.id !== mEditId);
  if (state.me === mEditId) state.me = state.members[0]?.id || null;
  closeSheet(); render(); toast('Silindi');
}

/* ============ SHARE ============ */
function buildShareUrl() { return location.origin + location.pathname + '#p=' + encodeURIComponent(encodeData(state)); }
function openShare() {
  const url = buildShareUrl();
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <h2>🔗 Programı paylaş</h2>
    <p class="hint">Bağlantıyı gönderdiğinde tüm program (kişiler, projeler, görevler) karşı tarafta açılır. Sunucu yok — veri linkin içinde taşınır.</p>
    <div class="field"><label>Paylaşım bağlantısı</label>
      <textarea class="share-code" id="shareUrl" rows="3" readonly>${url}</textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="openImport()">İçe aktar</button>
      <button class="btn btn-primary" onclick="copyShare()">Bağlantıyı kopyala</button>
    </div>
    <div class="btn-row" style="margin-top:10px;">
      <button class="btn btn-ghost" onclick="nativeShare()" style="flex:none;width:100%;">📤 Paylaş menüsü</button>
    </div>`;
  openSheet();
}
function copyShare() {
  const v = document.getElementById('shareUrl').value;
  navigator.clipboard?.writeText(v).then(() => toast('Bağlantı kopyalandı ✓'),
    () => { document.getElementById('shareUrl').select(); document.execCommand('copy'); toast('Kopyalandı ✓'); });
}
function nativeShare() {
  const url = document.getElementById('shareUrl').value;
  if (navigator.share) navigator.share({ title: state.title || 'Ortak Program', url }).catch(() => {});
  else copyShare();
}
function openImport() {
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `
    <h2>İçe aktar</h2>
    <p class="hint">Aldığın paylaşım bağlantısını veya kodu yapıştır.</p>
    <div class="field"><label>Bağlantı / kod</label>
      <textarea class="share-code" id="importVal" rows="4" placeholder="https://...#p=..."></textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeSheet()">İptal</button>
      <button class="btn btn-primary" onclick="doImport()">Yükle</button>
    </div>`;
  openSheet();
}
function doImport() {
  let v = document.getElementById('importVal').value.trim();
  const m = v.match(/[#&]p=([^&]+)/);
  if (m) v = m[1];
  try {
    const data = decodeData(decodeURIComponent(v));
    if (!data || !Array.isArray(data.tasks)) throw 0;
    if (!confirm('Mevcut programın yerine bu program yüklensin mi?')) return;
    state = migrate(data); activeFilter = 'all';
    closeSheet(); render(); toast('Program yüklendi ✓');
  } catch { toast('Geçersiz bağlantı/kod'); }
}

/* ============ HELPERS ============ */
function initials(n) { return (n || '?').trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('').toUpperCase(); }
function esc(s) { return (s || '').replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }
function escAttr(s) { return esc(s).replace(/"/g, '&quot;'); }
function todayStr() { return new Date().toISOString().slice(0, 10); }
function fmtDate(d) { return new Date(d + 'T00:00').toLocaleDateString('tr-TR', { day: 'numeric', month: 'short' }); }
function openSheet() { document.getElementById('backdrop').classList.add('open'); }
function closeSheet() { document.getElementById('backdrop').classList.remove('open'); }
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
  localStorage.setItem('ortakTheme', dark ? 'light' : 'dark');
}

/* ============ INIT ============ */
document.getElementById('progTitle').addEventListener('input', e => { state.title = e.target.value; save(); });
if (localStorage.getItem('ortakTheme') === 'dark') toggleTheme();
function init() {
  render();
  if (pendingImport) {
    if (confirm('Bir paylaşım bağlantısı açtınız. Bu program yüklensin mi? (Mevcut veriniz değişebilir)')) {
      state = pendingImport; activeFilter = 'all';
    }
    pendingImport = null; render();
  }
}
init();
</script>
